<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPEN THAN GO</title>

<style>
:root{
    --primary:#0f2d1a;
    --secondary:#1f7a3a;
    --accent:#ff6b35;
    --bg:#070b14;
    --card:#111a2e;
    --text:#ffffff;
    --dim:#94a3b8;
    --blue:#6ec6ff;
    --silver:#cfd8dc;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:12px;
}

.container-app{
    width:100%;
    max-width:520px;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
}

h1{
    text-align:center;
    font-size:26px;
    letter-spacing:1px;
}

.small{
    text-align:center;
    color:var(--dim);
    font-size:12px;
    margin-top:4px;
}

.lang-bar{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

.btn-lang{
    flex:1;
    padding:8px;
    border:none;
    border-radius:20px;
    background:#1a1f2e;
    color:#fff;
}

.btn-lang.active{
    background:var(--secondary);
}

.form-group{
    margin-bottom:10px;
}

label{
    font-size:12px;
    color:var(--dim);
}

input,select,textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:#fff;
    outline:none;
}

textarea{
    min-height:90px;
    resize:none;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.btn-primary{
    background:var(--accent);
    color:#fff;
}

.btn-secondary{
    background:var(--secondary);
    color:#fff;
}

.loader-screen{
    display:none;
    text-align:center;
    padding:30px;
}

.spinner{
    width:42px;
    height:42px;
    border:4px solid #333;
    border-top:4px solid var(--secondary);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

.interactive-screen{
    display:none;
}

#breathingCircle{
    width:110px;
    height:110px;
    margin:22px auto;
    border-radius:50%;
    background:radial-gradient(circle,var(--blue),var(--silver));
    box-shadow:0 0 25px rgba(120,200,255,.35);
    transform:scale(1);
    transition:transform 2.5s ease-in-out;
}

#timer{
    text-align:center;
    font-size:24px;
    margin-top:10px;
    font-weight:bold;
}

#step-content{
    margin-top:10px;
}

.card-box{
    background:#162033;
    padding:12px;
    border-radius:12px;
}

.btn-next-step{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:var(--primary);
    color:#fff;
    display:none;
}

.btn-maps-route{
    display:none;
    width:100%;
    padding:14px;
    border-radius:12px;
    background:#4285f4;
    text-align:center;
    color:#fff;
    text-decoration:none;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container-app">

    <!-- FORM -->
    <div id="wrapper-form" class="card">

        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
            <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
        </div>

        <h1>OPEN THAN GO</h1>
        <p class="small">Escape emocional guiado en tiempo real</p>

        <div class="form-group">
            <label>Estado</label>
            <input id="inp-state" placeholder="FL, TX, CA">
        </div>

        <div class="form-group">
            <label>ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>

        <div class="form-group">
            <label>Presupuesto</label>
            <select id="inp-budget">
                <option value="cero">$0</option>
                <option value="minimo">Mínimo</option>
                <option value="moderado">Medio</option>
                <option value="libre">Libre</option>
            </select>
        </div>

        <div class="form-group">
            <label>Desahogo</label>
            <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>
        </div>

        <button id="btn-start" class="btn btn-primary">
            GENERAR EXPERIENCIA
        </button>

    </div>

    <!-- LOADER -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p>Cargando experiencia...</p>
    </div>

    <!-- INTERACTIVE -->
    <div id="wrapper-interactive" class="interactive-screen">

        <div id="breathingCircle"></div>

        <div id="timer"></div>

        <div id="step-content" class="card"></div>

        <button id="btn-next" class="btn-next-step">CONTINUAR</button>

        <a id="btn-maps-action" class="btn-maps-route" target="_blank">
            ABRIR MAPA
        </a>

    </div>

</div>

<script src="/static/engine.js"></script>

</body>
</html>
