button{

}

}

.btn-casa{

.loader{
    display:none;

.place-card{
    background:#172033;

.place-card h3{
    margin-bottom:10px;
}

.price{
    font-weight:bold;
    margin-bottom:10px;
}

.recommended{
    display:inline-block;
    background:#f59e0b;
    color:black;
    font-weight:bold;
    padding:6px 12px;
    border-radius:20px;
    margin-bottom:10px;
}

.gps-btn{
    display:block;
    margin-top:15px;
    text-decoration:none;
    text-align:center;
    background:var(--primary);
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
}

.breath-circle{
    width:180px;
    height:180px;
    border-radius:50%;
    border:6px solid var(--primary);
    margin:30px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    transition:transform 4s ease-in-out;
}

#timerDisplay{
    font-size:60px;
    font-family:monospace;
    margin-top:20px;
}

.hidden{
    display:none;
}
</style>

</head>

<script>
// =====================================
// WAKE LOCK
// =====================================

let wakeLock = null;

async function requestWakeLock(){
    try{
        if('wakeLock' in navigator){
            wakeLock =
                await navigator
                .wakeLock
                .request('screen');
        }
    }
    catch(err){
        console.log(err);
    }
}

window.addEventListener(
    'load',
    requestWakeLock
);

document.addEventListener(
    'visibilitychange',
    async () => {
        if(
            document.visibilityState ===
            'visible'
        ){
            await requestWakeLock();
        }
    }
);

// =====================================
// KEEP SPEECH ALIVE
// =====================================

setInterval(() => {

    if(
        window.speechSynthesis &&
        speechSynthesis.paused
    ){
        speechSynthesis.resume();
    }

},2000);

// =====================================
// MOBILE KEEP ALIVE
// =====================================

setInterval(() => {
    document.body.dataset.keep =
        Date.now();
},15000);
</script>
