<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root { --bg: #000; --panel: #111; --text: #fff; --accent: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        h1 { font-size: 1.5rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 30px; color: #666; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2rem; color: #555; margin-bottom: 8px; }
        input, select { width: 100%; background: var(--panel); border: 1px solid #333; color: var(--text); padding: 15px; border-radius: 0; font-size: 1rem; box-sizing: border-box; }
        button#btn-mando { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
        #breath-circle { width: 120px; height: 120px; border: 2px solid white; border-radius: 50%; margin: 30px auto; animation: pulse 8s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 1; } }
        #timer { text-align: center; font-size: 2rem; margin-top: 10px; }
        .mision-card { border: 1px solid #333; padding: 20px; text-align: center; }
        .mision-card h2 { margin-top: 0; }
        .mision-card p { font-size: 0.95rem; line-height: 1.6; color: #ccc; }
        button { background: #333; color: white; border: none; padding: 12px 20px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="wrapper-form">
        <h1>OPEN THAN GO</h1>
        
        <div class="field">
            <label>Código Postal</label>
            <input type="text" id="inp-zip" placeholder="Ej: 33101">
        </div>

        <div class="field">
            <label>Modo de Operación</label>
            <select id="modo-selector">
                <option value="CASA">CASA (Estabilización/Misiones)</option>
                <option value="SALIR">SALIR (Destinos/Acción)</option>
            </select>
        </div>

        <div class="field">
            <label>Estado Mental</label>
            <select id="inp-mente">
                <option value="agotado">Agotado / Agobiado</option>
                <option value="estresado">Estresado / Tensión</option>
                <option value="aburrido">Aburrido / Rutina</option>
            </select>
        </div>
        <!-- Dentro del #wrapper-form, agrega esto antes del botón -->
<div class="field">
    <label>Presupuesto</label>
    <select id="inp-budget">
        <option value="0">Cero Gastos</option>
        <option value="1">Moderado</option>
        <option value="2">Sin Límite</option>
    </select>
</div>
<div class="field">
    <label>Perfil (Familia/Discapacidad)</label>
    <select id="inp-perfil">
        <option value="solo">Solo</option>
        <option value="familia">Con Niños / Familia</option>
        <option value="accesible">Requiere Acceso (Discapacidad/Edad)</option>
    </select>
</div>
        <button id="btn-mando">ACTIVAR MANDO</button>
    </div>

    <div class="container hidden" id="wrapper-interactive">
        <div id="step-content"></div>
    </div>

    <script src="/static/engine.js"></script>
</body>
</html>
