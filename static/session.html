<!-- Company: May Roga LLC -->
<!-- File: static/session.html (Frontend Interface) -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        /* Variables CSS para facilitar la gestión de temas y colores */
        :root {
            --bg: #000;             /* Fondo principal */
            --panel: #111;          /* Fondo de paneles y elementos interactivos */
            --text: #fff;           /* Color de texto principal */
            --accent: #d84315;      /* Color de acento (naranja) */
            --secondary: #0d47a1;   /* Color secundario (azul oscuro) */
            --green-action: #2e7d32; /* Color para acciones positivas (verde) */
            --blue-light: #00bcd4;  /* Azul claro para el círculo de respiración */
        }
        /* Reseteo básico y optimización */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Evita el scroll horizontal */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container { width: 95%; max-width: 420px; padding: 15px; position: relative; z-index: 10; }
        /* Barra de selección de idioma */
        .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .btn-lang {
            background: #222; color: #666; border: none; padding: 6px 12px; font-weight: 900;
            border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }
        .btn-lang.active { background: #fff; color: #000; }
       
        /* ANIMACIÓN MAESTRA DEL TÍTULO CON SENSACIÓN DE AIRE Y NUBES */
        .header-wrapper { position: relative; text-align: center; margin-bottom: 25px; padding: 20px 0; overflow: hidden; }
        h1.dynamic-title {
            font-size: 1.4rem; letter-spacing: 0.3em; font-weight: 900; margin: 0; z-index: 2;
            position: relative;
            animation: titleFloat 6s infinite ease-in-out, colorShift 12s infinite alternate;
        }
        /* Animación de flotación para el título */
        @keyframes titleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        /* Animación de cambio de color para el título */
        @keyframes colorShift {
            0% { color: var(--blue-light); text-shadow: 0 0 10px rgba(0,188,212,0.3); }
            100% { color: var(--green-action); text-shadow: 0 0 10px rgba(46,125,50,0.3); }
        }
       
        /* ESCENARIO DE NUBES BLANCAS EN MOVIMIENTO */
        .sky-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.25; z-index: 1; }
        .cloud { position: absolute; background: #fff; border-radius: 100px; filter: blur(4px); animation: windMove 18s infinite linear; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        /* Definición de la primera nube */
        .cloud.c1 { width: 60px; height: 20px; top: 10px; left: -70px; animation-duration: 22s; }
        .cloud.c1::before { width: 30px; height: 30px; top: -15px; left: 10px; }
        .cloud.c1::after { width: 20px; height: 20px; top: -10px; left: 30px; }
        /* Definición de la segunda nube */
        .cloud.c2 { width: 80px; height: 25px; top: 35px; left: -90px; animation-duration: 16s; animation-delay: 4s; }
        .cloud.c2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud.c2::after { width: 30px; height: 35px; top: -15px; left: 40px; }
        /* Animación de movimiento de viento para las nubes */
        @keyframes windMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(520px); } /* Asegura que las nubes salgan completamente del contenedor */
        }
       
        /* EL ORÁCULO: EFECTO CASCADA HACIA ARRIBA */
        .oraculo-scroll-box { position: relative; min-height: 280px; overflow: hidden; margin-bottom: 20px; }
        .oraculo-grid { display: flex; flex-direction: column; gap: 12px; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .btn-pregunta-crisis {
            width: 100%; background: var(--panel); color: #eee; border: 1px solid #222; padding: 16px;
            font-size: 1.05rem; font-weight: bold; text-align: left; border-radius: 8px; cursor: pointer;
            transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s; line-height: 1.4;
            transform-origin: top center; /* Para que la animación de escala se origine desde arriba */
        }
        /* Clase para el efecto de desvanecimiento de las preguntas */
        .btn-pregunta-crisis.fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(-30px); /* Reduce tamaño y lo mueve hacia arriba */
            margin-bottom: -64px; /* Colapsa el espacio para la siguiente pregunta */
            pointer-events: none; /* Deshabilita clics en elementos desvanecidos */
        }
       
        /* Estilos para campos de formulario */
        .field { margin-bottom: 12px; transition: all 0.5s ease; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15rem; color: #666; margin-bottom: 4px; font-weight: bold; }
        input, select, textarea {
            width: 100%; background: var(--panel); border: 1px solid #222; color: var(--text); padding: 12px;
            border-radius: 4px; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        textarea { height: 65px; resize: none; border-color: #333; }
        textarea:focus { border-color: var(--accent); } /* Resalta al enfocar */
       
        /* Clase de utilidad para ocultar elementos */
        .hidden { display: none !important; }
       
        /* Pantalla de bienvenida inicial */
        #pantalla-bienvenida {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            display:flex; justify-content:center; align-items:center; z-index:9999;
        }
        .btn-bienvenida {
            background:#fff; color:#000; padding:22px 45px; font-weight:900; cursor:pointer;
            text-transform:uppercase; border-radius:4px; font-size: 0.95rem; border: none;
            letter-spacing: 1px; transition: all 0.2s ease-in-out;
        }
        .btn-bienvenida:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
       
        /* Tarjetas de misión y acción de campo */
        .mision-card { border: 1px solid #222; padding: 26px; text-align: left; background: #0a0a0a; border-radius: 12px; width: 100%; }
        .mision-card small { color: #666; font-weight: bold; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .mision-card h2, .mision-card h3 { color: var(--green-action); font-size: 1.45rem; font-weight: 900; text-transform: uppercase; margin-top: 0; margin-bottom: 15px; }
        .mision-card p, .mision-card .instruccion-text {
            font-size: 1.25rem; line-height: 1.6; color: #eee; margin: 18px 0;
            border-left: 4px solid var(--green-action); padding-left: 14px; text-align: left; font-weight: bold;
        }
       
        /* CÍRCULO DE RESPIRACIÓN INTACTO y su animación de "pulso elástico" */
        #breath-circle {
            width: 135px; height: 135px; background: rgba(0, 188, 212, 0.15); border: 3px solid var(--blue-light);
            border-radius: 50%; margin: 35px auto; box-shadow: 0 0 20px rgba(0,188,212,0.2);
            animation: elasticLung 8s infinite ease-in-out; /* Animación de 8 segundos */
            transition: transform 0.2s ease; /* Transición suave al tocar */
        }
        @keyframes elasticLung {
            0% { transform: scale(0.85); background: rgba(0, 188, 212, 0.15); }
            50% { transform: scale(1.15); background: rgba(0, 188, 212, 0.3); } /* Aumenta tamaño y opacidad a la mitad */
            100% { transform: scale(0.85); background: rgba(0, 188, 212, 0.15); }
        }
        #timer { font-weight: 900; text-align: center; font-size: 3.2rem; margin: 15px 0; color: #fff; }
        #txt-pulmon { font-size: 15px; text-transform: uppercase; font-weight: bold; color: var(--blue-light); text-align: center; letter-spacing: 2px; }

        /* Media Queries para adaptabilidad en pantallas más pequeñas */
        @media (max-width: 375px) {
            .container { padding: 10px; }
            h1.dynamic-title { font-size: 1.2rem; letter-spacing: 0.2em; }
            .btn-pregunta-crisis { font-size: 0.95rem; padding: 14px; }
            .mision-card h2, .mision-card h3 { font-size: 1.25rem; }
            .mision-card p, .mision-card .instruccion-text { font-size: 1.1rem; }
            #timer { font-size: 2.8rem; }
            #breath-circle { width: 110px; height: 110px; margin: 25px auto; }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Bienvenida Inicial, visible al cargar la página -->
    <div id="pantalla-bienvenida">
        <button class="btn-bienvenida" onclick="KERNEL.despertarInicial();">INICIAR SESIÓN / START</button>
    </div>
   
    <!-- Contenedor principal del formulario, oculto hasta que se inicia la sesión -->
    <div class="container hidden" id="wrapper-form">
        <!-- Barra para selección de idioma -->
        <div class="lang-bar">
            <button class="btn-lang active" id="lang-es" onclick="KERNEL.cambiarIdioma('es')">ESP</button>
            <button class="btn-lang" id="lang-en" onclick="KERNEL.cambiarIdioma('en')">ENG</button>
        </div>
       
        <!-- CABECERA CON NUBES REALES EN MOVIMIENTO y TÍTULO DINÁMICO -->
        <div class="header-wrapper">
            <div class="sky-container">
                <div class="cloud c1"></div>
                <div class="cloud c2"></div>
            </div>
            <h1 class="dynamic-title" id="txt-app-title">OPEN THAN GO</h1>
        </div>
       
        <!-- ENTRADA DE GEOLOCALIZACIÓN Y SELECCIÓN DE MODO -->
        <div class="field" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 2;">
                <label id="lbl-zip">ZIP Code</label>
                <input type="text" id="inp-zip" placeholder="Ej: 33167" maxlength="5">
            </div>
            <div style="flex: 1;">
                <label>Modo</label>
                <select id="modo-selector">
                    <option value="SALIR" selected>SALIR</option>
                    <option value="CASA">CASA</option>
                </select>
            </div>
        </div>
       
        <!-- Instrucción del oráculo -->
        <p id="lbl-oraculo-instruccion" style="font-size: 0.8rem; text-transform: uppercase; color: var(--accent); font-weight: bold; letter-spacing: 1px; text-align: center; margin-bottom: 15px;">¿Qué te tiene atrapado hoy?</p>
       
        <!-- CAJÓN DE DESPLAZAMIENTO CASCADA para las preguntas del oráculo -->
        <div class="oraculo-scroll-box">
            <div class="oraculo-grid" id="contenedor-preguntas-oraculo">
                <!-- Las preguntas se inyectarán dinámicamente por engine.js -->
            </div>
        </div>
       
        <!-- EL CAJÓN DE ESCRITURA LIBRE -->
        <div class="field" id="bloque-escritura-libre">
            <label id="lbl-desahogo" style="color: #aaa; transition: color 0.3s;">O escribe aquí tu propio agobio si no aparece arriba:</label>
            <textarea id="inp-text-libre" placeholder="Cuéntale al mando libremente qué te pasa hoy..."></textarea>
            <button id="btn-activar-libre" style="width: 100%; background: #222; color: #888; border: 1px solid #333; padding: 14px; font-weight: 900; margin-top: 10px; border-radius: 4px; text-transform: uppercase; cursor: pointer; transition: all 0.3s;">Activar Mando Libre</button>
        </div>

        <!-- Input oculto para pasar el texto seleccionado/escrito al backend -->
        <input type="hidden" id="inp-text-invisible">
    </div>

    <!-- CONTENEDOR DE SALIDA INTERACTIVA PARA MISIONES, PARQUES, VIDEOS Y PULMÓN -->
    <div class="container hidden" id="wrapper-interactive"></div>

    <!-- Carga el script principal del frontend -->
    <script src="/static/engine.js"></script>
</body>
</html>
