<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OPEN THAN GO</title>
    <style>
        :root{
            --bg:#0b1220;
            --card:#111a2e;
            --primary:#3b82f6;
            --success:#22c55e;
            --danger:#ef4444;
            --text:#ffffff;
            --dim:#94a3b8;
        }
        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family:'Segoe UI', Arial, sans-serif;
            background:var(--bg);
            color:var(--text);
            display:flex;
            flex-direction: column;
            align-items:center;
            min-height:100vh;
        }
        #main-container{
            width:100%;
            max-width:700px;
            padding:20px;
        }
        .card{
            background:var(--card);
            padding:20px;
            border-radius:16px;
            margin:15px 0;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.05);
        }
        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:12px;
            background:var(--primary);
            color:white;
            font-weight:bold;
            font-size: 16px;
            cursor:pointer;
            transition:0.2s;
            margin-bottom: 5px;
        }
        button:hover{ transform:translateY(-2px); }
        button:disabled{ background: #334155; cursor: not-allowed; transform: none; }
       
        .answer{
            background:#1f2937;
            padding:12px;
            margin:8px 0;
            border-radius:10px;
            cursor:pointer;
            border-left:4px solid var(--primary);
            transition:0.2s;
        }
        .answer:hover{ transform:translateX(5px); background:#374151; }

        .breath-circle{
            width:160px;
            height:160px;
            border-radius:50%;
            margin:30px auto;
            border:6px solid var(--primary);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size: 24px;
            font-weight: bold;
            transition: transform 4s ease-in-out;
        }

        h1,h2,h3{ margin:10px 0; }
        .small{ font-size:12px; color:var(--dim); }
        .center{ text-align:center; }

        #admin-controls {
            display: none;
            margin-top: 20px;
            opacity: 0.3;
        }

        #admin-controls:hover {
            opacity: 1;
        }

<div id="main-container">
    <div class="card center">
        <h2 style="color:var(--primary);">OPEN THAN GO SYSTEM</h2>
    <div id="app">
        <div class="card center">
            <h3>INITIALIZING SYSTEM...</h3>
            <p>Syncing missions 1-21. Please wait.</p>
        </div>
    </div>

    <div id="admin-controls" class="card">
        <input id="missionInput" type="number" min="1" max="21" placeholder="Mission ID (1-21)"
               style="width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:10px; background:#1f2937; color:white;">
       
        <button onclick="jumpToMissionManual()" style="background:#4b5563;">
            DEBUG: JUMP TO MISSION
        </button>
    </div>
</div>

<script src="/static/js/engine.js"></script>

<script>
<!-- TITLE -->
<h1 id="interactive-title">OPEN ◯ THAN GO</h1>

<!-- MODE -->
<div id="mode-badge" class="mode-badge mode-salir">
Modo: Salir
</div>

<!-- FORM -->
<div id="form">

    <div class="form-group">
        <label>Estado (USA - 50 STATES)</label>
        <input id="inp-state" placeholder="FL, TX, CA, NY...">
    </div>

    <div class="form-group">
        <label>ZIP Code</label>
        <input id="inp-zip" placeholder="33101">
    </div>

    <div class="form-group">
        <label>Presupuesto</label>
        <select id="inp-budget">
            <option value="cero">$0 - $40</option>
            <option value="minimo">$20 - $60</option>
            <option value="moderado">$40 - $70</option>
            <option value="libre">Libre</option>
        </select>
    </div>

    <div class="form-group">
        <textarea id="inp-text" placeholder="¿Cómo te sientes hoy?"></textarea>
    </div>

    <button class="btn btn-primary" onclick="setMode('salir')">
        SALIR (EXPLORAR)
    </button>

    <button class="btn btn-casa" onclick="setMode('casa')">
        CASA (RESET 10 MIN)
    </button>

    <button class="btn btn-primary" onclick="start()">
        GENERAR OPEN THAN GO
    </button>

</div>

<!-- LOADER -->
<div id="loader" class="loader">
    <p>Creando experiencia emocional...</p>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

/* ================= GLOBAL STATE ================= */
const state = {
    mode: "salir"
};

/* ================= MODE CONTROL ================= */
function setMode(m){

    state.mode = m;

    const badge = document.getElementById("mode-badge");

    if(m === "casa"){
        badge.innerText = "Modo: Casa (Reset emocional)";
        badge.className = "mode-badge mode-casa";
        document.getElementById("interactive-title").innerText = "OPEN ◯ THAN GO";
    } else {
        badge.innerText = "Modo: Salir (Exploración terapéutica)";
        badge.className = "mode-badge mode-salir";
        document.getElementById("interactive-title").innerText = "OPEN ◎ THAN GO";
    }
}

/* ================= START ================= */
async function start(){

    document.getElementById("form").style.display="none";
    document.getElementById("loader").style.display="block";

    const payload = {
        decision: state.mode,
        estado: document.getElementById("inp-state").value,
        zip_code: document.getElementById("inp-zip").value,
        budget_level: document.getElementById("inp-budget").value,
        desahogo: document.getElementById("inp-text").value
    };

    const res = await fetch("/api/open-than-go",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    const data = await res.json();

    document.getElementById("loader").style.display="none";

    render(data);
}

/* ================= RENDER ENGINE (FIXED BIO FLOW) ================= */
function render(data){

    const result = document.getElementById("result");

    let html = "";

    /* ================= CASA FLOW ================= */
    if(data.type === "Casa" || data.type === "HOME"){

        html += `
        <div class="card">
            <h2>OPEN ◯ THAN GO</h2>

// =========================================================
// KEEP SCREEN / SESSION ACTIVE ON MOBILE
// =========================================================
let wakeLock = null;

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log(`Wake Lock error: ${err.name}`);
    }
}

document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
        await requestWakeLock();
    }
});

window.addEventListener('load', async () => {
    await requestWakeLock();
});

// =========================================================
// PREVENT FREEZE ON IOS / ANDROID
// =========================================================
setInterval(() => {
    document.body.dataset.keepalive = Date.now();
}, 15000);

setInterval(() => {
    if (window.speechSynthesis && speechSynthesis.paused) {
        speechSynthesis.resume();
    }
}, 2000);

// =========================================================
// MANUAL LINK WITH ENGINE.JS (Updated 1-21)
// =========================================================
function jumpToMissionManual() {
    const input = document.getElementById("missionInput");
    const id = Number(input.value);
   
    if (id > 0 && typeof state !== "undefined") {
        const idx = state.missions.findIndex(m => m.id === id);

        if (idx !== -1) {
            window.speechSynthesis.cancel();

            if(state.timer) {
                clearInterval(state.timer);
            }

            state.currentIndex = idx;
            state.currentBlock = 0;
            state.phase = "story";

            render();
        } else {
            alert("Mission ID not found in current mission files.");
        }
    }
}

function showAdmin() {
    document.getElementById('admin-controls').style.display = 'block';
}
</script>

</body>
</html>
