<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPEN THAN GO</title>

<style>
:root {
    --primary:#162a1a;
    --secondary:#2e7d32;
    --accent:#ff5a2c;
    --bg:#f4f7f4;
    --card:#ffffff;
    --blue:#7cc7ff;
    --silver:#cfd8dc;
    --text:#1b1b1b;
}

/* GLOBAL */
* { box-sizing:border-box; }
body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    display:flex;
    justify-content:center;
}

/* APP */
.container-app {
    width:100%;
    max-width:520px;
    background:var(--card);
    min-height:100vh;
    padding:18px;
}

/* HEADER */
.header-app {
    text-align:center;
    margin-bottom:10px;
}
.header-app h1 {
    margin:0;
    color:var(--primary);
    letter-spacing:1px;
}
.header-app p {
    margin:5px 0;
    color:#555;
    font-size:14px;
}

/* LANG */
.lang-bar {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.btn-lang {
    flex:1;
    padding:8px;
    border:none;
    border-radius:20px;
    background:#eaeaea;
}
.btn-lang.active {
    background:var(--primary);
    color:#fff;
}

/* FORM */
.form-group { margin-bottom:12px; }

label {
    font-size:13px;
    color:#444;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
}

textarea { min-height:70px; }

/* BUTTONS */
.btn-choice {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#eee;
    margin:3px 0;
    width:100%;
}

.btn-choice.active {
    background:var(--secondary);
    color:white;
}

.btn-trigger {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-weight:bold;
}

/* LOADER */
.loader-screen {
    display:none;
    text-align:center;
    padding:50px 20px;
}

.spinner {
    width:42px;
    height:42px;
    border:4px solid #ddd;
    border-top:4px solid var(--secondary);
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin { 100% { transform:rotate(360deg); } }

/* INTERACTIVE */
.interactive-screen {
    display:none;
    padding-top:10px;
}

/* 🔵 BREATHING ORB PRO */
.breath-container {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:20px 0;
}

#breathingCircle {
    width:110px;
    height:110px;
    border-radius:50%;
    background:radial-gradient(circle, var(--blue), var(--silver));
    box-shadow:0 0 30px rgba(120,200,255,0.6);
    transform:scale(1);
    transition:transform 2.5s ease-in-out;
}

#breathLabel {
    margin-top:10px;
    font-weight:bold;
    color:var(--primary);
}

#breathTime {
    font-size:13px;
    color:#666;
}

/* TIMER */
#timer {
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
    color:var(--primary);
}

/* CONTENT */
#step-content {
    margin-top:10px;
    font-size:15px;
    line-height:1.5;
    color:var(--text);
    padding:10px;
    border-radius:12px;
    background:#fafafa;
}

/* BUTTONS FLOW */
.btn-next-step {
    width:100%;
    padding:14px;
    margin-top:10px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:10px;
    display:none;
    font-weight:bold;
}

.btn-maps-route {
    display:none;
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#4285f4;
    color:white;
    text-align:center;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container-app">

<!-- FORM -->
<div id="wrapper-form">

    <div class="lang-bar">
        <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
        <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
    </div>

    <div class="header-app">
        <h1>OPEN THAN GO</h1>
        <p>Tu escape emocional inteligente</p>
    </div>

    <div class="form-group">
        <label>Estado</label>
        <select id="inp-state">
            <option value="FL">Florida</option>
            <option value="TX">Texas</option>
            <option value="CA">California</option>
        </select>
    </div>

    <div class="form-group">
        <label>Región</label>
        <select id="inp-region"></select>
    </div>

    <div class="form-group">
        <label>ZIP</label>
        <input id="inp-zip" placeholder="33101">
    </div>

    <div class="form-group">
        <label>Presupuesto</label>
        <button class="btn-choice active" id="b-cero" onclick="cambiarBolsillo('cero')">$0</button>
        <button class="btn-choice" id="b-minimo" onclick="cambiarBolsillo('minimo')">Mínimo</button>
        <button class="btn-choice" id="b-moderado" onclick="cambiarBolsillo('moderado')">Medio</button>
        <button class="btn-choice" id="b-libre" onclick="cambiarBolsillo('libre')">Libre</button>
    </div>

    <div class="form-group">
        <label>Modo</label>
        <button class="btn-choice active" id="m-salir" onclick="cambiarModalidad(true)">Salir</button>
        <button class="btn-choice" id="m-casa" onclick="cambiarModalidad(false)">Casa</button>
    </div>

    <div class="form-group">
        <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>
    </div>

    <button id="btn-start" class="btn-trigger">GENERAR ESCAPE</button>

</div>

<!-- LOADER -->
<div id="wrapper-loader" class="loader-screen">
    <div class="spinner"></div>
    <p>Calculando experiencia...</p>
</div>

<!-- INTERACTIVE -->
<div id="wrapper-interactive" class="interactive-screen">

    <div class="breath-container">
        <div id="breathingCircle"></div>
        <div id="breathLabel"></div>
        <div id="breathTime"></div>
    </div>

    <div id="timer"></div>

    <div id="step-content"></div>

    <button id="btn-next" class="btn-next-step">CONTINUAR</button>

    <a id="btn-maps-action" class="btn-maps-route" target="_blank">
        ABRIR MAPA
    </a>

</div>

</div>

<script src="/static/engine.js"></script>

</body>
</html>
