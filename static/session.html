<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPEN THAN GO</title>

<style>
:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --text:#ffffff;
    --dim:#94a3b8;
    --salir:#ff6b35;
    --casa:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,Arial;
    display:flex;
    justify-content:center;
}

#main-container{
    width:100%;
    max-width:750px;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    margin-bottom:15px;
}

.center{text-align:center}

.mode-badge{
    padding:10px;
    border-radius:30px;
    font-weight:bold;
}

.mode-salir{background:rgba(255,107,53,.15);color:#ffb08d}
.mode-casa{background:rgba(34,197,94,.15);color:#8ff0af}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-primary{background:var(--salir);color:white}
.btn-casa{background:var(--casa);color:white}

.loader{display:none;text-align:center}

.place-card{
    background:#172033;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    border-left:4px solid var(--primary);
}

.hidden{display:none}

.breath-circle{
    width:160px;
    height:160px;
    border-radius:50%;
    border:5px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:20px auto;
    transition:transform 2s;
}
</style>
</head>

<body>

<div id="main-container">

    <div class="card center">
        <h1>OPEN ◯ THAN GO</h1>

        <div id="mode-badge" class="mode-badge mode-salir">
            Modo: Salir
        </div>
    </div>

    <div class="card">

        <input id="inp-state" placeholder="FL">
        <input id="inp-zip" placeholder="33101">

        <select id="inp-budget">
            <option value="cero">$0 - $40</option>
            <option value="minimo">$20 - $60</option>
            <option value="moderado">$40 - $90</option>
            <option value="libre">Libre</option>
        </select>

        <textarea id="inp-text" placeholder="Cómo te sientes hoy..."></textarea>

        <button class="btn-primary" onclick="setMode('salir')">
            SALIR
        </button>

        <button class="btn-casa" onclick="setMode('casa')">
            CASA
        </button>

        <button class="btn-primary" onclick="startOpenThanGo()">
            GENERAR EXPERIENCIA
        </button>

    </div>

    <div id="loader" class="loader card">
        <h3>Cargando experiencia...</h3>
    </div>

    <div id="result"></div>

</div>

<script src="/static/engine.js"></script>

<script>
// FIX REAL: evita freeze de speech en móviles
setInterval(() => {
    if (window.speechSynthesis?.paused) {
        speechSynthesis.resume();
    }
}, 2000);

// Wake lock seguro
async function keepAwake(){
    try{
        if('wakeLock' in navigator){
            await navigator.wakeLock.request('screen');
        }
    }catch(e){}
}

window.addEventListener("load", keepAwake);

// FIX UI: evitar estado muerto
document.addEventListener("visibilitychange", async () => {
    if(document.visibilityState === "visible"){
        keepAwake();
    }
});
</script>

</body>
</html>
