<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --bg: #000;
            --panel: #111;
            --text: #fff;
            --accent: #d84315;
            --secondary: #0d47a1; 
            --glow: #2196f3;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            color: #444;
            font-weight: 900;
        }
        .field {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            background: var(--panel);
            border: 1px solid #222;
            color: var(--text);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }
        textarea {
            height: 60px;
            resize: none;
        }
        button#btn-mando {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .retention-layer {
            text-align: center;
            padding: 20px 10px;
        }
        .timer-text {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 30px;
        }
        .lung-box {
            width: 120px;
            height: 120px;
            background: rgba(216, 67, 21, 0.05);
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
            box-shadow: 0 0 15px rgba(216, 67, 21, 0.2);
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); background: rgba(216, 67, 21, 0.15); }
            100% { transform: scale(0.9); }
        }
        button#action-blue-button {
            width: 100%;
            background: var(--secondary);
            color: #fff;
            border: none;
            padding: 18px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: none;
        }
        .instruction-box {
            background: var(--panel);
            border-left: 3px solid var(--accent);
            padding: 15px;
            border-radius: 0 4px 4px 0;
            text-align: left;
            margin-bottom: 25px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .hidden {
            display: none !important;
        }
        #pantalla-bienvenida {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .btn-bienvenida {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px 40px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Pantalla de inicio obligatoria corregida con ejecución directa -->
    <div id="pantalla-bienvenida">
        <button class="btn-bienvenida" onclick="KERNEL.despertarInicial();">INICIAR SESIÓN</button>
    </div>

    <!-- Contenedor del Formulario del Mando Integral -->
    <div class="container hidden" id="wrapper-form">
        <h1 id="txt-app-title">OPEN THAN GO</h1>
        
        <div class="field">
            <label id="lbl-zip">Código Postal</label>
            <input type="text" id="inp-zip" placeholder="Ej: 33167" maxlength="5">
        </div>
        
        <div class="field">
            <label id="lbl-mode">Modo de Operación</label>
            <select id="modo-selector">
                <option value="CASA">CASA (Estabilización)</option>
                <option value="SALIR" selected>SALIR (Acción)</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-mente">Estado Mental</label>
            <select id="inp-mente">
                <option value="agotado">Agotado</option>
                <option value="estresado">Estresado</option>
                <option value="aburrido">Aburrido</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-budget">Presupuesto</label>
            <select id="inp-budget">
                <option value="0">Cero Gastos</option>
                <option value="1">Moderado</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-perfil">Perfil</label>
            <select id="inp-perfil">
                <option value="solo">Solo</option>
                <option value="familia">Familia</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-desahogo">Desahogo</label>
            <textarea id="inp-text" placeholder="Escribe tu estado actual... (deudas, monotonía, biles, etc.)"></textarea>
        </div>
        
        <button id="btn-mando">ACTIVAR MANDO</button>
    </div>

    <!-- Capa del Espejo Interactivo del Kernel -->
    <div class="container hidden" id="wrapper-interactive">
        <div class="retention-layer">
            <div class="timer-text" id="retention-status">Sincronizando Frecuencia...</div>
            <div class="lung-box" id="pulmon-visual">35</div>
            <div class="instruction-box hidden" id="texto-instruccion"></div>
            <button id="action-blue-button">Cargando Misión...</button>
        </div>
    </div>

    <script src="/static/engine.js"></script>
</body>
</html>
