<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO PRO</title>

    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --gray: #eeeeee;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial;
            margin: 0;
            padding: 10px;
            background: var(--light);
            display: flex;
            justify-content: center;
        }

        .container-app {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 20px;
            border-radius: 16px;
        }

        .btn-choice {
            padding: 10px;
            border: none;
            background: var(--gray);
            border-radius: 8px;
            cursor: pointer;
            margin: 2px;
        }

        .btn-choice.active {
            background: var(--secondary);
            color: white;
        }

        .btn-trigger {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .loader-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .interactive-screen {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .lang-bar {
            display: flex;
            gap: 10px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--gray);
            cursor: pointer;
        }

        .btn-lang.active {
            background: var(--primary);
            color: white;
        }

        textarea, input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 12px;
        }

        #breathingCircle {
            width: 80px;
            height: 80px;
            margin: 20px auto;
            border-radius: 50%;
            background: #4fc3f7;
            transition: transform 4s ease-in-out;
        }
    </style>
</head>

<body>

<div class="container-app">

    <!-- FORM -->
    <div id="wrapper-form">

        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active">ES</button>
            <button id="lang-en" class="btn-lang">EN</button>
        </div>

        <h2>OPEN THAN GO</h2>
        <p id="txt-subtitle">Tu escape emocional inteligente</p>

        <div class="form-group">
            <label>Estado</label>
            <select id="inp-state">
                <option value="FL">Florida</option>
                <option value="TX">Texas</option>
                <option value="CA">California</option>
            </select>
        </div>

        <div class="form-group">
            <label>Región</label>
            <select id="inp-region">
                <option value="South Florida">South Florida</option>
                <option value="Central Florida">Central Florida</option>
                <option value="North Texas">North Texas</option>
                <option value="Los Angeles Area">Los Angeles Area</option>
            </select>
        </div>

        <div class="form-group">
            <label>ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>

        <div class="form-group">
            <label>Presupuesto</label><br>

            <button class="btn-choice active" onclick="setPocket('cero')">$0</button>
            <button class="btn-choice" onclick="setPocket('minimo')">Mínimo</button>
            <button class="btn-choice" onclick="setPocket('moderado')">Medio</button>
            <button class="btn-choice" onclick="setPocket('libre')">Libre</button>
        </div>

        <div class="form-group">
            <label>Modo</label><br>

            <button class="btn-choice active" onclick="setMode('out')">Salir</button>
            <button class="btn-choice" onclick="setMode('home')">Casa</button>
        </div>

        <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>

        <button class="btn-trigger" onclick="generateEscape()">
            GENERAR ESCAPE
        </button>

    </div>

    <!-- LOADER -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p>Calculando experiencia...</p>
    </div>

    <!-- INTERACTIVE -->
    <div id="wrapper-interactive" class="interactive-screen">

        <div id="breathingCircle"></div>

        <div id="step-content"></div>

    </div>

</div>

<script src="/static/engine.js"></script>

<script>

let engine = null;

/* =========================
   INIT BRIDGE
========================= */
window.addEventListener("DOMContentLoaded", () => {
    engine = window.OPEN_THAN_GO;
});

/* =========================
   LANGUAGE
========================= */
document.getElementById("lang-es").onclick = () => {
    if (!engine) return;
    engine.state.lang = "es";
};

document.getElementById("lang-en").onclick = () => {
    if (!engine) return;
    engine.state.lang = "en";
};

/* =========================
   POCKET
========================= */
function setPocket(val) {
    if (engine) engine.state.pocket = val;
}

/* =========================
   MODE
========================= */
function setMode(mode) {
    if (engine) engine.state.mode = mode;
}

/* =========================
   VALIDACIÓN ESTADO-REGIÓN
========================= */
function validarUbicacion() {

    const estado = document.getElementById("inp-state").value;
    const region = document.getElementById("inp-region").value;

    const reglas = {
        "FL": ["South Florida", "Central Florida"],
        "TX": ["North Texas"],
        "CA": ["Los Angeles Area"]
    };

    if (!reglas[estado].includes(region)) {
        alert("La región no coincide con el estado seleccionado.");
        return false;
    }

    return true;
}

/* =========================
   START
========================= */
function generateEscape() {

    if (!validarUbicacion()) return;

    const estado = document.getElementById("inp-state").value;
    const region = document.getElementById("inp-region").value;
    const zip = document.getElementById("inp-zip").value;
    const text = document.getElementById("inp-text").value;

    if (engine) {
        engine.state.userInput = { estado, region, zip, text };
    }

    document.getElementById("wrapper-form").style.display = "none";
    document.getElementById("wrapper-loader").style.display = "block";

    setTimeout(() => {

        document.getElementById("wrapper-loader").style.display = "none";
        document.getElementById("wrapper-interactive").style.display = "block";

        if (engine) {
            engine.startFlow(engine.state.mode || "out");
        }

    }, 1800);
}

</script>

</body>
</html>
