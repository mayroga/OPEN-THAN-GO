<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --light: #f1f8e9;
            --dark: #111111;
            --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container-app {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .header-app {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-app h1 {
            color: var(--primary);
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header-app p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-lang {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-lang.active {
            background: var(--primary);
            color: var(--white);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-group textarea {
            height: 80px;
            resize: none;
        }
        .btn-mode-container {
            display: flex;
            gap: 10px;
        }
        .btn-mode {
            flex: 1;
            background: #eee;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-mode.active {
            background: var(--secondary);
            color: var(--white);
        }
        .btn-trigger {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-trigger:hover {
            background: #2a522a;
        }
        .card-surprise {
            margin-top: 25px;
            padding: 20px;
            border-left: 5px solid var(--secondary);
            background: #f9f9f9;
            border-radius: 4px 8px 8px 4px;
        }
        .card-surprise h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
        }
        .card-surprise .badge-location {
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 15px;
            font-size: 14px;
        }
        .card-surprise pre {
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 20px 0;
            color: #333;
        }
        .btn-maps {
            display: block;
            text-align: center;
            background: #4285f4;
            color: var(--white);
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container-app">
    <div class="lang-bar">
        <button class="btn-lang active" id="lang-es" onclick="cambiarIdioma('es')">Español 🇪🇸</button>
        <button class="btn-lang" id="lang-en" onclick="cambiarIdioma('en')">English 🇺🇸</button>
    </div>

    <div class="header-app">
        <h1 id="txt-title">OPEN THAN GO</h1>
        <p id="txt-subtitle">Tu botón de escape inmediato para romper la monotonía urbana.</p>
    </div>

    <div class="form-group">
        <label id="lbl-state">Estado / State:</label>
        <select id="inp-state">
            <option value="FL">Florida (Miami, Orlando, Tampa, Lehigh Acres...)</option>
            <option value="TX">Texas (Houston, Dallas...)</option>
            <option value="CA">California (Los Angeles...)</option>
            <option value="NY">New York</option>
        </select>
    </div>

    <div class="form-group">
        <label id="lbl-zip">ZIP Code (5 dígitos):</label>
        <input type="text" id="inp-zip" placeholder="Ej: 33936" maxlength="5">
    </div>

    <div class="form-group">
        <label id="lbl-mode">¿Puedes o quieres salir de casa hoy?</label>
        <div class="btn-mode-container">
            <button class="btn-mode active" id="mode-out" onclick="setModalidad(true)">🟢 SÍ, NECESITO SALIR</button>
            <button class="btn-mode" id="mode-in" onclick="setModalidad(false)">🏠 NO, ME QUEDO EN CASA</button>
        </div>
    </div>

    <div class="form-group">
        <label id="lbl-text">Desahógate aquí (Escribe libremente lo que traigas en la mente):</label>
        <textarea id="inp-text" placeholder="Escribe si estás cansado de la rutina, preocupado por biles o el trabajo, solo, o con niños aburridos..."></textarea>
    </div>

    <button class="btn-trigger" id="btn-submit" onclick="ejecutarEscape()">SÁCAME DE LA MONOTONÍA</button>

    <div id="result-box" class="card-surprise" style="display: none;">
        <h2 id="res-title"></h2>
        <div class="badge-location" id="res-location"></div>
        <pre id="res-steps"></pre>
        <a id="res-maps" href="#" target="_blank" class="btn-maps" style="display: none;">🗺️ ABRIR RUTA EN MI MAPA GRATIS</a>
    </div>
</div>

<script src="/static/engine.js"></script>
</body>
</html>
