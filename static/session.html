<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>

    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --gray: #eeeeee;
            --white: #ffffff;
            --blue: #6ec6ff;
            --silver: #cfd8dc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background: var(--light);
            display: flex;
            justify-content: center;
        }

        .container-app {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 20px;
            border-radius: 16px;
        }

        .header-app h1 {
            margin: 0;
            color: var(--primary);
        }

        .btn-choice {
            padding: 10px;
            border: none;
            background: var(--gray);
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-choice.active {
            background: var(--secondary);
            color: white;
        }

        .btn-trigger {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-next-step {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            display: none;
        }

        .btn-maps-route {
            display: none;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #4285f4;
            color: white;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
        }

        .loader-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .interactive-screen {
            display: none;
            padding-top: 10px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .lang-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--gray);
            cursor: pointer;
        }

        .btn-lang.active {
            background: var(--primary);
            color: white;
        }

        textarea, input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 12px;
        }

        /* ================================
           🔵 BREATHING ORB (BLUE/SILVER)
        ================================= */
        #breathingCircle {
            width: 95px;
            height: 95px;
            margin: 25px auto;
            border-radius: 50%;
            background: radial-gradient(circle, var(--blue), var(--silver));
            box-shadow: 0 0 25px rgba(120,200,255,0.6);
            transform: scale(1);
            transition: transform 2.5s ease-in-out, opacity 1s ease;
        }

        /* ================================
           TIMER DISPLAY
        ================================= */
        #timer {
            font-size: 20px;
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
            font-weight: bold;
        }

        /* ================================
           END SCREEN
        ================================= */
        .end-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #333;
            color: white;
        }

        .card-box {
            padding: 12px;
            border-radius: 12px;
            background: #fafafa;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container-app">

    <!-- ================= FORM ================= -->
    <div id="wrapper-form">

        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
            <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
        </div>

        <div class="header-app">
            <h1>OPEN THAN GO</h1>
            <p id="txt-subtitle">Tu escape emocional inteligente</p>
        </div>

        <div class="form-group">
            <label id="lbl-state">Estado</label>
            <select id="inp-state">
                <option value="FL">Florida</option>
                <option value="TX">Texas</option>
                <option value="CA">California</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lbl-region">Región</label>
            <select id="inp-region"></select>
        </div>

        <div class="form-group">
            <label id="lbl-zip">ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>

        <div class="form-group">
            <label>Presupuesto</label>

            <button class="btn-choice active" id="b-cero" onclick="cambiarBolsillo('cero')">$0</button>
            <button class="btn-choice" id="b-minimo" onclick="cambiarBolsillo('minimo')">Mínimo</button>
            <button class="btn-choice" id="b-moderado" onclick="cambiarBolsillo('moderado')">Medio</button>
            <button class="btn-choice" id="b-libre" onclick="cambiarBolsillo('libre')">Libre</button>
        </div>

        <div class="form-group">
            <label>Modo</label>

            <button class="btn-choice active" id="m-salir" onclick="cambiarModalidad(true)">Salir</button>
            <button class="btn-choice" id="m-casa" onclick="cambiarModalidad(false)">Casa</button>
        </div>

        <div class="form-group">
            <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>
        </div>

        <button id="btn-start" class="btn-trigger">
            GENERAR ESCAPE
        </button>

    </div>

    <!-- ================= LOADER ================= -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p id="txt-loader">Calculando...</p>
    </div>

    <!-- ================= INTERACTIVE ================= -->
    <div id="wrapper-interactive" class="interactive-screen">

        <h2 id="interactive-title"></h2>
        <p id="interactive-subtitle"></p>

        <!-- BREATHING ORB -->
        <div id="breathingCircle"></div>

        <!-- TIMER -->
        <div id="timer"></div>

        <!-- CONTENT -->
        <div id="step-content"></div>

        <button id="btn-next" class="btn-next-step">CONTINUAR</button>

        <a id="btn-maps-action" class="btn-maps-route" target="_blank">
            ABRIR MAPA
        </a>

        <!-- END SCREEN -->
        <div id="end-screen" class="end-buttons"></div>

    </div>

</div>

<script src="/static/engine.js"></script>

</body>
</html>
