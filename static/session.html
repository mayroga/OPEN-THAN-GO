<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root { 
            --bg: #000; 
            --panel: #111; 
            --text: #fff; 
            --accent: #d84315; 
            --secondary: #0d47a1; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .btn-lang { background: #222; color: #666; border: none; padding: 6px 12px; font-weight: 900; border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        .btn-lang.active { background: #fff; color: #000; }
        h1 { font-size: 1.2rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 25px; color: #444; font-weight: 900; }
        .field { margin-bottom: 14px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15rem; color: #666; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; background: var(--panel); border: 1px solid #222; color: var(--text); padding: 14px; border-radius: 4px; font-size: 0.95rem; outline: none; }
        textarea { height: 65px; resize: none; }
        button#btn-mando { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; font-weight: 900; cursor: pointer; margin-top: 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .hidden { display: none !important; }
        
        #pantalla-bienvenida { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .btn-bienvenida { background:#fff; color:#000; padding:22px 45px; font-weight:900; cursor:pointer; text-transform:uppercase; border-radius:4px; font-size: 0.95rem; border: none; letter-spacing: 1px; }
        
        /* DISEÑO DE INTERFAZ INTEGRAL UNIFICADO (GRANDES, LEGIBLES Y LIMPIOS) */
        .mision-card { border: 1px solid #222; padding: 26px; text-align: left; background: #0a0a0a; border-radius: 12px; width: 100%; }
        .mision-card small { color: #666; font-weight: bold; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .mision-card h2, .mision-card h3 { color: #2e7d32; font-size: 1.45rem; font-weight: 900; text-transform: uppercase; margin-top: 0; margin-bottom: 15px; letter-spacing: 0.5px; }
        .mision-card p, .mision-card .instruccion-text { font-size: 1.25rem; line-height: 1.6; color: #eee; margin: 18px 0; border-left: 4px solid #2e7d32; padding-left: 14px; text-align: left; font-weight: bold; }
        
        /* PULMÓN ELÁSTICO DE 35 SEGUNDOS Y 10 MINUTOS */
        #breath-circle { width: 135px; height: 135px; background: rgba(0, 188, 212, 0.15); border: 3px solid #00bcd4; border-radius: 50%; margin: 35px auto; animation: elasticLung 4s infinite ease-in-out; box-shadow: 0 0 20px rgba(0,188,212,0.2); }
        @keyframes elasticLung {
            0% { transform: scale(0.85); box-shadow: 0 0 10px rgba(0, 188, 212, 0.2); }
            50% { transform: scale(1.15); background: rgba(0, 188, 212, 0.3); box-shadow: 0 0 35px rgba(0,188,212,0.5); }
            100% { transform: scale(0.85); box-shadow: 0 0 10px rgba(0, 188, 212, 0.2); }
        }
        #timer { font-weight: 900; text-align: center; font-size: 3.2rem; margin: 15px 0; color: #fff; }
        #txt-pulmon { font-size: 15px; text-transform: uppercase; font-weight: bold; color: #00bcd4; text-align: center; letter-spacing: 2px; }
    </style>
</head>

<!-- OPEN THAN GO SYSTEM - Kernel Absolute Engine V.5.0.0 -->
<!-- Company: May Roga LLC -->
<!-- File: static/session.html - SECCIÓN 2 DE 2 (MANDO INTEGRAL FÍSICO) -->

<body>
    <!-- Pantalla de inicio obligatoria para desbloquear el audio del celular -->
    <div id="pantalla-bienvenida">
        <button class="btn-bienvenida" onclick="KERNEL.despertarInicial();">INICIAR SESIÓN / START</button>
    </div>

    <div class="container hidden" id="wrapper-form">
        <!-- Barra de control bilingüe integrada -->
        <div class="lang-bar">
            <button class="btn-lang active" id="lang-es" onclick="KERNEL.cambiarIdioma('es')">ESP</button>
            <button class="btn-lang" id="lang-en" onclick="KERNEL.cambiarIdioma('en')">ENG</button>
        </div>
        
        <h1 id="txt-app-title">OPEN THAN GO</h1>
        
        <div class="field">
            <label id="lbl-zip">Código Postal</label>
            <input type="text" id="inp-zip" placeholder="Ej: 33167" maxlength="5">
        </div>
        
        <div class="field">
            <label id="lbl-mode">Modo de Operación</label>
            <select id="modo-selector">
                <option value="CASA">CASA (Estabilización)</option>
                <option value="SALIR" selected>SALIR (Acción)</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-mente">Estado Mental</label>
            <select id="inp-mente">
                <option value="agotado">Agotado</option>
                <option value="estresado">Estresado</option>
                <option value="aburrido">Aburrido</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-budget">Presupuesto</label>
            <select id="inp-budget">
                <option value="0">Cero Gastos</option>
                <option value="1">Moderado</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-perfil">Perfil</label>
            <select id="inp-perfil">
                <option value="solo">Solo</option>
                <option value="familia">Familia</option>
            </select>
        </div>
        
        <div class="field">
            <label id="lbl-desahogo">Desahogo</label>
            <textarea id="inp-text" placeholder="Escribe libremente cómo te sientes hoy..."></textarea>
        </div>
        
        <button id="btn-mando">ACTIVAR MANDO</button>
    </div>

    <!-- Contenedor único e integrado para las misiones del parásito virtuoso -->
    <div class="container hidden" id="wrapper-interactive">
        <!-- El Kernel inyecta aquí dinámicamente las misiones unificadas -->
    </div>

    <script src="/static/engine.js"></script>
</body>
</html>
