<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root { 
            --casa: #2a5298; 
            --salir: #f12711; 
            --bg: #f4f6f4; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #333; transition: border-color 0.3s; }
        .lang-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-lang { flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .btn-lang.active { background: #333; color: white; }
        .group { display: flex; gap: 10px; margin-bottom: 15px; }
        .group button { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; }
        .group button.active { border-color: #333; background: #f9f9f9; }
        textarea, input { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        #btn-start { width: 100%; padding: 18px; background: #000; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .breath-circle { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; background: radial-gradient(circle, #fff, var(--casa)); animation: respirar 8s infinite ease-in-out; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        @keyframes respirar { 0%, 100% { transform: scale(0.8); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        
        .btn-vibrante { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: var(--salir); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #timer { font-size: 3em; font-weight: bold; text-align: center; color: var(--casa); margin: 20px 0; }
        .mision-card { text-align: center; padding: 20px; }
        .salida-title { text-align: center; color: var(--salir); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" id="wrapper-form">
    <div class="lang-bar">
        <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
        <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
    </div>

    <h1>OPEN THAN GO</h1>
    
    <div class="group">
        <button id="m-salir" class="active" onclick="cambiarModalidad(true)">SALIR</button>
        <button id="m-casa" onclick="cambiarModalidad(false)">CASA</button>
    </div>

    <div class="group">
        <button id="b-cero" class="active" onclick="cambiarBolsillo('cero')">$0</button>
        <button id="b-minimo" onclick="cambiarBolsillo('minimo')">$10</button>
        <button id="b-moderado" onclick="cambiarBolsillo('moderado')">$50</button>
        <button id="b-libre" onclick="cambiarBolsillo('libre')">LIBRE</button>
    </div>

    <textarea id="inp-text" rows="3" placeholder="¿Qué necesitas soltar hoy?"></textarea>
    <input type="text" id="inp-zip" placeholder="ZIP Code">
    <input type="text" id="inp-state" placeholder="Estado">
    
    <button id="btn-start">ACTIVAR MANDO</button>
</div>

<div class="container" id="wrapper-loader" style="display:none; text-align:center;">
    <p>Conectando con tu estado actual...</p>
</div>

<div class="container" id="wrapper-interactive" style="display:none;">
    <div id="step-content"></div>
</div>

<script src="/static/engine.js"></script>
</body>
</html>
