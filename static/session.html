<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO PRO</title>

    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --gray: #eeeeee;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial;
            margin: 0;
            padding: 10px;
            background: var(--light);
            display: flex;
            justify-content: center;
        }

        .container-app {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 20px;
            border-radius: 16px;
        }

        .btn-choice {
            padding: 10px;
            border: none;
            background: var(--gray);
            border-radius: 8px;
            cursor: pointer;
            margin: 2px;
        }

        .btn-choice.active {
            background: var(--secondary);
            color: white;
        }

        .btn-trigger {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-next-step {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
        }

        .btn-maps-route {
            display: none;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #4285f4;
            color: white;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
        }

        .loader-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .interactive-screen {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .lang-bar {
            display: flex;
            gap: 10px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--gray);
        }

        .btn-lang.active {
            background: var(--primary);
            color: white;
        }

        textarea, input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 12px;
        }

        /* 🔵 BREATHING CIRCLE */
        #breathingCircle {
            width: 80px;
            height: 80px;
            margin: 20px auto;
            border-radius: 50%;
            background: #4fc3f7;
            transition: transform 4s ease-in-out;
        }
    </style>
</head>

<body>

<div class="container-app">

    <!-- FORM -->
    <div id="wrapper-form">

        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
            <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
        </div>

        <h2>OPEN THAN GO</h2>
        <p id="txt-subtitle">Tu escape emocional inteligente</p>

        <div class="form-group">
            <label>Estado</label>
            <select id="inp-state"></select>
        </div>

        <div class="form-group">
            <label>Región</label>
            <select id="inp-region"></select>
        </div>

        <div class="form-group">
            <label>ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>

        <div class="form-group">
            <label>Presupuesto</label><br>
            <button class="btn-choice active" onclick="setPocket('cero')">$0</button>
            <button class="btn-choice" onclick="setPocket('minimo')">Mínimo</button>
            <button class="btn-choice" onclick="setPocket('moderado')">Medio</button>
            <button class="btn-choice" onclick="setPocket('libre')">Libre</button>
        </div>

        <div class="form-group">
            <label>Modo</label><br>
            <button class="btn-choice active" onclick="setMode('out')">Salir</button>
            <button class="btn-choice" onclick="setMode('home')">Casa</button>
        </div>

        <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>

        <button class="btn-trigger" onclick="generateEscape()">
            GENERAR ESCAPE
        </button>

    </div>

    <!-- LOADER -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p>Calculando experiencia...</p>
    </div>

    <!-- INTERACTIVE -->
    <div id="wrapper-interactive" class="interactive-screen">

        <div id="breathingCircle"></div>

        <h3 id="interactive-title"></h3>
        <p id="interactive-subtitle"></p>

        <div id="step-content"></div>

        <button id="btn-next" class="btn-next-step">CONTINUAR</button>

        <a id="btn-maps-action" class="btn-maps-route" target="_blank">ABRIR MAPA</a>

    </div>

</div>

<script src="/static/engine.js"></script>

<script>

/* =========================
   GLOBAL BRIDGE TO ENGINE
========================= */

let engine = null;

window.addEventListener("DOMContentLoaded", () => {
    engine = window.OPEN_THAN_GO;
});

/* LANGUAGE */
function cambiarIdioma(lang) {
    if (!engine) return;
    engine.state.lang = lang;

    document.getElementById("lang-es").classList.toggle("active", lang === "es");
    document.getElementById("lang-en").classList.toggle("active", lang === "en");
}

/* POCKET */
function setPocket(val) {
    if (engine) engine.state.pocket = val;
}

/* MODE FIX */
function setMode(mode) {
    if (engine) engine.setMode(mode);
}

/* ESCAPE START */
function generateEscape() {

    document.getElementById("wrapper-form").style.display = "none";
    document.getElementById("wrapper-loader").style.display = "block";

    setTimeout(() => {
        document.getElementById("wrapper-loader").style.display = "none";
        document.getElementById("wrapper-interactive").style.display = "block";

        if (engine) engine.startFlow();

    }, 2000);
}

</script>

</body>
</html>
