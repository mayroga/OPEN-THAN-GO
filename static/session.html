<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>

    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --gray: #eeeeee;
            --white: #ffffff;
            --blue: #6ec6ff;
            --silver: #cfd8dc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 12px;
            background: var(--light);
            display: flex;
            justify-content: center;
        }

        .container-app {
            width: 100%;
            max-width: 520px;
            background: var(--white);
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* ================= TITLE ================= */
        .header-app {
            text-align: center;
            margin-bottom: 10px;
        }

        #app-title {
            font-size: 26px;
            font-weight: bold;
            transition: all 0.6s ease;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.7;
        }

        /* ================= BUTTONS ================= */
        .btn-choice {
            padding: 10px;
            border: none;
            background: var(--gray);
            border-radius: 10px;
            cursor: pointer;
            margin: 3px;
        }

        .btn-choice.active {
            background: var(--secondary);
            color: white;
        }

        .btn-trigger {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-next-step {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            display: none;
        }

        .btn-maps-route {
            display: none;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #4285f4;
            color: white;
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
        }

        /* ================= WRAPPERS ================= */
        .loader-screen, .interactive-screen {
            display: none;
            text-align: center;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #ccc;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ================= BREATH ================= */
        #breathingCircle {
            width: 100px;
            height: 100px;
            margin: 20px auto;
            border-radius: 50%;
            background: radial-gradient(circle, var(--blue), var(--silver));
            box-shadow: 0 0 25px rgba(120,200,255,0.6);
            transition: transform 2.5s ease-in-out;
        }

        /* ================= TIMER ================= */
        #timer {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 10px;
        }

        /* ================= INPUTS ================= */
        textarea, input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 12px;
        }

        /* ================= LAYOUT ================= */
        .lang-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--gray);
        }

        .btn-lang.active {
            background: var(--primary);
            color: white;
        }

        /* ================= EXPERIENCE PANEL ================= */
        #step-content {
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.5;
            min-height: 80px;
        }

        /* ================= MODE INDICATOR ================= */
        .mode-indicator {
            font-size: 12px;
            opacity: 0.6;
            margin-top: -5px;
        }
    </style>
</head>

<body>

<div class="container-app">

    <!-- ================= HEADER ================= -->
    <div class="header-app">

        <!-- 🔥 IMPORTANTE: ESTE ES EL TÍTULO DINÁMICO -->
        <div id="app-title">OPEN THAN GO</div>

        <div class="subtitle" id="txt-subtitle">
            Tu escape emocional inteligente
        </div>

        <div class="mode-indicator" id="mode-indicator"></div>
    </div>

    <!-- ================= FORM ================= -->
    <div id="wrapper-form">

        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
            <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="inp-state">
                <option value="FL">Florida</option>
                <option value="TX">Texas</option>
                <option value="CA">California</option>
            </select>
        </div>

        <div class="form-group">
            <label>Región</label>
            <select id="inp-region"></select>
        </div>

        <div class="form-group">
            <label>ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>

        <div class="form-group">
            <label>Presupuesto</label><br>
            <button class="btn-choice active" id="b-cero" onclick="cambiarBolsillo('cero')">$0</button>
            <button class="btn-choice" id="b-minimo" onclick="cambiarBolsillo('minimo')">Mín</button>
            <button class="btn-choice" id="b-moderado" onclick="cambiarBolsillo('moderado')">Med</button>
            <button class="btn-choice" id="b-libre" onclick="cambiarBolsillo('libre')">Libre</button>
        </div>

        <div class="form-group">
            <label>Modo de decisión</label><br>
            <button class="btn-choice active" id="m-salir" onclick="cambiarModalidad(true)">SALIR</button>
            <button class="btn-choice" id="m-casa" onclick="cambiarModalidad(false)">CASA</button>
        </div>

        <div class="form-group">
            <textarea id="inp-text" placeholder="¿Cómo te sientes hoy?"></textarea>
        </div>

        <button id="btn-start" class="btn-trigger">
            GENERAR EXPERIENCIA
        </button>
    </div>

    <!-- ================= LOADER ================= -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p>Analizando estado emocional...</p>
    </div>

    <!-- ================= INTERACTIVE ================= -->
    <div id="wrapper-interactive" class="interactive-screen">

        <div id="breathingCircle"></div>
        <div id="timer"></div>

        <div id="step-content"></div>

        <button id="btn-next" class="btn-next-step">CONTINUAR</button>

        <a id="btn-maps-action" class="btn-maps-route" target="_blank">
            ABRIR MAPA
        </a>

    </div>

</div>

<script src="/static/engine.js"></script>

<script>
function $(id){ return document.getElementById(id); }

/* =========================
   TITLE STATE MACHINE VISUAL
   ========================= */
let state = {
    mode: "salir",
    emotion: {
        stress: false,
        monotony: false,
        lowEnergy: false
    }
};

function updateTitle() {

    const el = $("app-title");
    if (!el) return;

    let base = "OPEN THAN GO";

    if (state.emotion.stress) base = "OPEN ◉ THAN GO";
    if (state.emotion.monotony) base = "OPEN — THAN GO";
    if (state.emotion.lowEnergy) base = "OPEN ○ THAN GO";

    if (state.mode === "casa") base = "OPEN ◯ THAN GO";
    if (state.mode === "salir") base = "OPEN ◎ THAN GO";

    el.innerText = base;
    animateTitle(el);
}

function animateTitle(el) {

    el.style.transition = "all 0.6s ease";

    if (state.mode === "salir") {
        el.style.letterSpacing = "2px";
        el.style.transform = "scale(1.02)";
    } else {
        el.style.letterSpacing = "0px";
        el.style.transform = "scale(0.98)";
    }

    if (state.emotion.stress) el.style.color = "#d84315";
    else if (state.emotion.monotony) el.style.color = "#6ec6ff";
    else el.style.color = "#1e3a1e";
}

setInterval(updateTitle, 500);
</script>

</body>
</html>
