<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPEN THAN GO</title>

<style>
:root {
    --primary:#162a1a;
    --secondary:#2e7d32;
    --accent:#ff5a2c;
    --bg:#f4f7f4;
    --card:#ffffff;
    --blue:#7cc7ff;
    --silver:#cfd8dc;
    --text:#1b1b1b;
}

/* RESET */
* { box-sizing:border-box; }

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
}

/* APP CONTAINER */
.container-app {
    width:100%;
    max-width:520px;
    min-height:100vh;
    background:var(--card);
    padding:18px;
}

/* HEADER (OPEN THAN GO FEELING) */
.header-app {
    text-align:center;
    margin-bottom:10px;
}

.header-app h1 {
    margin:0;
    color:var(--primary);
    letter-spacing:1px;
    transition:all 0.6s ease;
}

.header-app p {
    margin:5px 0;
    font-size:14px;
    color:#555;
}

/* LANGUAGE */
.lang-bar {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.btn-lang {
    flex:1;
    padding:8px;
    border:none;
    border-radius:20px;
    background:#eaeaea;
    cursor:pointer;
}

.btn-lang.active {
    background:var(--primary);
    color:white;
}

/* FORM */
.form-group { margin-bottom:12px; }

label {
    font-size:13px;
    color:#444;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
}

textarea { min-height:70px; resize:none; }

/* CHOICE BUTTONS */
.btn-choice {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin:3px 0;
    background:#eee;
    cursor:pointer;
}

.btn-choice.active {
    background:var(--secondary);
    color:white;
}

/* MAIN ACTION */
.btn-trigger {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* LOADER */
.loader-screen {
    display:none;
    text-align:center;
    padding:50px 20px;
}

.spinner {
    width:42px;
    height:42px;
    border:4px solid #ddd;
    border-top:4px solid var(--secondary);
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}

/* INTERACTIVE AREA */
.interactive-screen {
    display:none;
    padding-top:10px;
}

/* BREATHING (CASA MODE CORE) */
.breath-container {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:20px 0;
}

#breathingCircle {
    width:110px;
    height:110px;
    border-radius:50%;
    background:radial-gradient(circle, var(--blue), var(--silver));
    box-shadow:0 0 30px rgba(120,200,255,0.6);
    transform:scale(1);
    transition:transform 2.2s ease-in-out;
}

#breathLabel {
    margin-top:10px;
    font-weight:bold;
    color:var(--primary);
}

#breathTime {
    font-size:13px;
    color:#666;
}

/* TIMER (CASA RESET SUPPORT) */
#timer {
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
    color:var(--primary);
}

/* CONTENT (MISSION FEED) */
#step-content {
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    background:#fafafa;
    font-size:15px;
    line-height:1.5;
    color:var(--text);
}

/* NAV BUTTONS */
.btn-next-step {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-weight:bold;
    display:none;
    cursor:pointer;
}

.btn-maps-route {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:10px;
    background:#4285f4;
    color:white;
    text-align:center;
    display:none;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container-app">

<!-- ================= FORM ================= -->
<div id="wrapper-form">

    <div class="lang-bar">
        <button id="lang-es" class="btn-lang active">ES</button>
        <button id="lang-en" class="btn-lang">EN</button>
    </div>

    <div class="header-app">
        <h1 id="app-title">OPEN THAN GO</h1>
        <p>Tu escape emocional inteligente</p>
    </div>

    <div class="form-group">
        <label>Estado (USA 50 estados)</label>
        <select id="inp-state">
            <option value="FL">Florida</option>
            <option value="TX">Texas</option>
            <option value="CA">California</option>
            <option value="NY">New York</option>
            <option value="IL">Illinois</option>
        </select>
    </div>

    <div class="form-group">
        <label>Región</label>
        <select id="inp-region"></select>
    </div>

    <div class="form-group">
        <label>ZIP</label>
        <input id="inp-zip" placeholder="Ej: 33101">
    </div>

    <div class="form-group">
        <label>Presupuesto</label>

        <button class="btn-choice active" id="b-cero">0 - 40 USD</button>
        <button class="btn-choice" id="b-minimo">20 - 60 USD</button>
        <button class="btn-choice" id="b-moderado">40 - 70 USD</button>
        <button class="btn-choice" id="b-libre">Sin límite</button>
    </div>

    <div class="form-group">
        <label>Modo de vida</label>

        <button class="btn-choice active" id="m-salir">Salir</button>
        <button class="btn-choice" id="m-casa">Casa</button>
    </div>

    <div class="form-group">
        <textarea id="inp-text" placeholder="¿Cómo te sientes hoy?"></textarea>
    </div>

    <button id="btn-start" class="btn-trigger">
        GENERAR ESCAPE
    </button>

</div>

<!-- ================= LOADER ================= -->
<div id="wrapper-loader" class="loader-screen">
    <div class="spinner"></div>
    <p>Creando tu experiencia emocional...</p>
</div>

<!-- ================= INTERACTIVE ================= -->
<div id="wrapper-interactive" class="interactive-screen">

    <!-- BREATHING -->
    <div class="breath-container">
        <div id="breathingCircle"></div>
        <div id="breathLabel"></div>
        <div id="breathTime"></div>
    </div>

    <!-- TIMER -->
    <div id="timer"></div>

    <!-- MISSION -->
    <div id="step-content"></div>

    <!-- ACTIONS -->
    <button id="btn-next" class="btn-next-step">CONTINUAR</button>

    <a id="btn-maps-action" class="btn-maps-route" target="_blank">
        ABRIR RUTA
    </a>

</div>

</div>

<script src="/static/engine.js"></script>

</body>
</html>
