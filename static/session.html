<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --bg: #000;
            --panel: #111;
            --text: #fff;
            --accent: #d84315;
            --secondary: #2e7d32;
            --blue-circle: #00bcd4;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        h1 { font-size: 1.5rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 25px; color: #666; font-weight: 900; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2rem; color: #555; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; background: var(--panel); border: 1px solid #333; color: var(--text); padding: 14px; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        textarea { height: 65px; resize: none; }
       
        button#btn-mando { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; font-weight: 800; cursor: pointer; margin-top: 15px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        .hidden { display: none; }
       
        /* Pantalla de Bienvenida Absoluta para forzar el Audio */
        #pantalla-bienvenida { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .btn-bienvenida { background:#fff; color:#000; border:none; padding:20px 40px; font-size:1.2rem; font-weight:900; letter-spacing:2px; cursor:pointer; text-transform:uppercase; border-radius:6px; }

        #breath-circle { width: 120px; height: 120px; border: 3px solid #00bcd4; border-radius: 50%; margin: 30px auto; animation: pulse 8s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.85); opacity: 0.4; border-color: #00bcd4; } 50% { transform: scale(1.15); opacity: 1; border-color: #00e5ff; box-shadow: 0 0 30px rgba(0,229,255,0.4); } }
       
        #timer { text-align: center; font-size: 2.5rem; margin-top: 10px; font-weight: 800; }
        .mision-card { border: 1px solid #333; padding: 20px; text-align: center; background: #0a0a0a; border-radius: 12px; }
        .mision-card h2, .mision-card h3 { margin-top: 0; font-size: 1.4rem; color: #fff; text-transform: uppercase; }
        .mision-card p { font-size: 0.95rem; line-height: 1.6; color: #ccc; }
       
        button { background: #333; color: white; border: none; padding: 14px 20px; margin-top: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .feedback-box { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.4; text-align: left; }
        .fb-correcto { background: #1b5e20; color: #fff; border-left: 4px solid #4caf50; }
        .fb-incorrecto { background: #b71c1c; color: #fff; border-left: 4px solid #f44336; }
    </style>
</head>
<body>

<!-- LA GRAN SORPRESA: Activa la voz desde el primer segundo del clic -->
<div id="pantalla-bienvenida">
    <button class="btn-bienvenida" onclick="KERNEL.despertarInicial()">ENTRAR</button>
</div>

<div class="container hidden" id="wrapper-form">
    <h1>OPEN THAN GO</h1>
   
    <div class="field">
        <label>Código Postal</label>
        <input type="text" id="inp-zip" placeholder="Ej: 33167">
    </div>
   
    <div class="field">
        <label>Modo de Operación</label>
        <select id="modo-selector">
            <option value="CASA">CASA (Estabilización/Misiones)</option>
            <option value="SALIR" selected>SALIR (Destinos/Acción)</option>
        </select>
    </div>
   
    <div class="field">
        <label>Estado Mental</label>
        <select id="inp-mente">
            <option value="agotado">Agotado / Agobiado</option>
            <option value="estresado">Estresado / Tensión</option>
            <option value="aburrido">Aburrido / Rutina</option>
        </select>
    </div>
   
    <div class="field">
        <label>Presupuesto</label>
        <select id="inp-budget">
            <option value="0">Cero Gastos</option>
            <option value="1">Moderado</option>
            <option value="2">Sin Límite</option>
        </select>
    </div>

    <div class="field">
        <label>Perfil (Familia/Discapacidad)</label>
        <select id="inp-perfil">
            <option value="solo">Solo</option>
            <option value="familia">Con Niños / Familia</option>
            <option value="accesible">Requiere Acceso (Discapacidad/Edad)</option>
        </select>
    </div>

    <div class="field">
        <label>Desahogo (Filtro Emocional)</label>
        <textarea id="inp-text" placeholder="Escribe libremente cómo te sientes hoy..."></textarea>
    </div>

    <button id="btn-mando">ACTIVAR MANDO</button>
</div>

<div class="container hidden" id="wrapper-interactive">
    <div id="step-content"></div>
</div>

<script src="/static/engine.js"></script>
</body>
</html>
