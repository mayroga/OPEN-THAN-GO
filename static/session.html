<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --dark: #111111;
            --white: #ffffff;
            --gray: #eeeeee;
            --blue-circle: #00bcd4;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container-app {
            background: var(--white);
            max-width: 480px;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            margin: 10px auto;
        }
        .header-app { text-align: center; margin-bottom: 20px; }
        .header-app h1 { color: var(--primary); margin: 0 0 8px 0; font-size: 26px; font-weight: 800; }
        .header-app p { margin: 0; color: #555; font-size: 13px; line-height: 1.4; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-lang { background: var(--gray); border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex: 1; max-width: 120px; text-align: center; }
        .btn-lang.active { background: var(--primary); color: var(--white); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--primary); }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 14px; background-color: #fafafa; font-family: inherit;
        }
        .form-group textarea { height: 95px; resize: none; }
        
        .btn-grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        .btn-choice { background: var(--gray); border: none; padding: 14px 4px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-align: center; line-height: 1.2; }
        .btn-choice.active { background: var(--secondary); color: var(--white); }
        .btn-trigger {
            width: 100%; background: var(--accent); color: var(--white); border: none; padding: 16px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(216,67,21,0.2);
        }
        
        /* MOTOR DE DESPLIEGUE INTERACTIVO */
        .interactive-screen {
            display: none;
            text-align: center;
            padding: 10px 5px;
        }
        .screen-title { color: var(--primary); font-size: 20px; font-weight: 800; margin-bottom: 15px; }
        .screen-story { font-size: 14px; line-height: 1.6; color: #333; margin-bottom: 20px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; border-left: 4px solid var(--secondary); }
        
        /* CÍRCULO RESPIRATORIO AZUL INTERACTIVO */
        .wrapper-circle { display: flex; justify-content: center; align-items: center; height: 180px; margin: 20px 0; }
        .breath-circle {
            width: 105px; height: 105px; background-color: var(--blue-circle); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 0 25px rgba(0,188,212,0.5); transform: scale(1.0); transition: transform 4s ease-in-out;
        }
        .breath-circle.expand { transform: scale(1.5); }
        .breath-circle.contract { transform: scale(1.0); }
        .txt-instruccion-pulmon { font-size: 11px; margin-top: 4px; font-weight: 800; letter-spacing: 0.5px; }
        .timer-display { font-size: 34px; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .global-timer { font-size: 13px; font-weight: 700; color: var(--accent); background: #feebee; padding: 8px 16px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
        
        /* TRIVIAS TÁLTILES DINÁMICAS */
        .contenedor-opciones { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .btn-opcion {
            width: 100%; text-align: left; padding: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; line-height: 1.4;
        }
        .feedback-box { display: none; margin-top: 15px; padding: 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; text-align: left; }
        .feedback-box.fb-correcto { background-color: #e8f5e9; color: #1b5e20; border-left: 5px solid var(--secondary); }
        .feedback-box.fb-incorrecto { background-color: #ffebee; color: #b71c1c; border-left: 5px solid var(--accent); }
        
        .btn-next-step { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 15px; }
        .btn-maps-route { display: none; text-align: center; background: #4285f4; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 14px; margin-top: 20px; box-shadow: 0 4px 10px rgba(66,133,244,0.3); }
        .wrapper-loader { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 10px; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--gray); border-top-color: var(--secondary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container-app">
    <!-- CAPA 1: FORMULARIO DE RECOLECCIÓN COMPLETO -->
    <div id="wrapper-form">
        <div class="lang-bar">
            <button class="btn-lang active" id="lang-es" onclick="cambiarIdioma('es')">Español 🇪🇸</button>
            <button class="btn-lang" id="lang-en" onclick="cambiarIdioma('en')">English 🇺🇸</button>
        </div>

        <div class="header-app">
            <h1>OPEN THAN GO</h1>
            <p id="txt-subtitle">Tu escape emocional inteligente</p>
        </div>

        <div class="form-group">
            <label id="lbl-state">Estado</label>
            <select id="inp-state">
                <option value="FL">Florida (Miami, Orlando, Tampa, Lehigh Acres...)</option>
                <option value="TX">Texas (Houston, Dallas...)</option>
                <option value="CA">California (Los Angeles...)</option>
                <option value="NY">New York</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lbl-region">Región / Condado</label>
            <input type="text" id="inp-region" placeholder="Ej: Miami-Dade / Lee County">
        </div>

        <div class="form-group">
            <label id="lbl-zip">ZIP Code</label>
            <input type="tel" id="inp-zip" placeholder="Ej: 33167" maxlength="5">
        </div>

        <div class="form-group">
            <label id="lbl-mode">¿Salir o quedarte en casa?</label>
            <div class="btn-grid-2">
                <button class="btn-choice active" id="m-salir" onclick="cambiarModalidad(true)">🟢 SALIR (Acción)</button>
                <button class="btn-choice" id="m-casa" onclick="cambiarModalidad(false)">🏠 CASA (Estabilización)</button>
            </div>
        </div>

        <div class="form-group">
            <label id="lbl-budget">Presupuesto Disponible</label>
            <div class="btn-grid-4">
                <button class="btn-choice active" id="b-cero" onclick="cambiarBolsillo('cero')">CERO GASTOS</button>
                <button class="btn-choice" id="b-minimo" onclick="cambiarBolsillo('minimo')">GASTO MÍNIMO</button>
                <button class="btn-choice" id="b-moderado" onclick="cambiarBolsillo('moderado')">MODERADO</button>
                <button class="btn-choice" id="b-libre" onclick="cambiarBolsillo('libre')">SIN LÍMITE</button>
            </div>
        </div>

        <div class="form-group">
            <label id="lbl-desahogo">Desahogo Opcional (Filtro Emocional)</label>
            <textarea id="inp-text" placeholder="Escribe libremente cómo te sientes hoy..."></textarea>
        </div>

        <button class="btn-trigger" id="btn-main-trigger" onclick="solicitarEscape()">ACTIVAR MANDO</button>
    </div>

    <!-- CAPA 2: LOADER DE SINCRONIZACIÓN -->
    <div id="wrapper-loader" class="wrapper-loader">
        <div class="spinner"></div>
        <p id="txt-loader" style="font-weight: 700; color: var(--primary); font-size: 14px;">Sincronizando frecuencias de bienestar...</p>
    </div>

    <!-- CAPA 3: ENTORNO INTERACTIVO PASO A PASO (EL ALMA DEL SISTEMA) -->
    <div id="wrapper-interactive" class="interactive-screen">
        <div id="wrapper-global-timer" style="display:none; text-align: center;">
            <div class="global-timer" id="global-timer-txt">⏱️ Tiempo restante: 10:00</div>
        </div>
        <h2 id="interactive-title" class="screen-title">OPEN THAN GO</h2>
        <div id="interactive-subtitle" style="font-weight: 700; font-size: 13px; color: var(--accent); margin-bottom: 12px; text-transform: uppercase;"></div>
        
        <div id="step-content"></div>
