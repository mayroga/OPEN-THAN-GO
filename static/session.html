<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRO DE ACTIVACIÓN BIOMÉTRICA</title>
    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 24px; margin-bottom: 30px; letter-spacing: -0.5px; }

        p { color: #555; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }

        .btn-action {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: var(--secondary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-action:active { transform: scale(0.98); }

        .btn-secondary { background: #555; }

        #protocol-display {
            text-align: left;
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid var(--accent);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="app">
        </div>

    <script src="/static/engine.js"></script>
</body>
</html>
