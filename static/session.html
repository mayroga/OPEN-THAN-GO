<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPEN THAN GO</title>

<style>
:root{
    --primary:#162a1a;
    --salir:#ff5a2c;
    --casa:#2e7d32;
    --bg:#f4f7f4;
    --card:#ffffff;
    --blue:#7cc7ff;
    --silver:#cfd8dc;
    --text:#1b1b1b;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    display:flex;
    justify-content:center;
}

.container-app{
    width:100%;
    max-width:520px;
    background:var(--card);
    min-height:100vh;
    padding:16px;
}

/* ================= TITLE ================= */
#interactive-title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
    transition:0.5s;
}

/* ================= MODE BADGE ================= */
.mode-badge{
    text-align:center;
    font-size:12px;
    padding:6px;
    border-radius:20px;
    margin-bottom:10px;
}

/* CASA / SALIR LOOK */
.mode-casa{ background:#e8f5e9; color:var(--casa); }
.mode-salir{ background:#fff3e0; color:var(--salir); }

/* ================= FORM ================= */
.form-group{ margin-bottom:10px; }

input,select,textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* ================= BUTTONS ================= */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:5px;
}

.btn-primary{ background:var(--salir); color:white; }
.btn-casa{ background:var(--casa); color:white; }

/* ================= CARDS ================= */
.card{
    background:#fafafa;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    border-left:4px solid var(--primary);
}

.price{
    font-weight:bold;
    color:var(--primary);
}

/* ================= RECOMMENDATIONS ================= */
.place-card{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.place-card h3{
    margin:0;
    font-size:16px;
}

.place-actions{
    margin-top:8px;
}

/* ================= LOADER ================= */
.loader{
    display:none;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<div class="container-app">

<!-- TITLE -->
<h1 id="interactive-title">OPEN THAN GO</h1>

<div id="mode-badge" class="mode-badge mode-salir">
Modo: Salir
</div>

<!-- FORM -->
<div id="form">

    <div class="form-group">
        <label>Estado (USA)</label>
        <input id="inp-state" placeholder="FL, TX, CA, NY...">
    </div>

    <div class="form-group">
        <label>ZIP Code</label>
        <input id="inp-zip">
    </div>

    <div class="form-group">
        <label>Presupuesto</label>
        <select id="inp-budget">
            <option value="cero">$0 - $40</option>
            <option value="minimo">$20 - $60</option>
            <option value="moderado">$40 - $70</option>
            <option value="libre">Sin límite</option>
        </select>
    </div>

    <div class="form-group">
        <textarea id="inp-text" placeholder="¿Cómo te sientes hoy?"></textarea>
    </div>

    <button class="btn btn-primary" onclick="setMode('salir')">
        SALIR
    </button>

    <button class="btn btn-casa" onclick="setMode('casa')">
        CASA (RESET)
    </button>

    <button class="btn btn-primary" onclick="start()">
        GENERAR OPEN THAN GO
    </button>
</div>

<!-- LOADER -->
<div id="loader" class="loader">
    <p>Creando tu experiencia...</p>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script src="/static/engine.js"></script>

<script>
function setMode(m){
    state.mode = m;

    const badge = document.getElementById("mode-badge");

    if(m === "casa"){
        badge.innerText = "Modo: Casa (Reset emocional)";
        badge.className = "mode-badge mode-casa";
    } else {
        badge.innerText = "Modo: Salir (Exploración)";
        badge.className = "mode-badge mode-salir";
    }

    updateTitle();
}

async function start(){

    document.getElementById("form").style.display="none";
    document.getElementById("loader").style.display="block";

    const payload = {
        decision: state.mode,
        estado: document.getElementById("inp-state").value,
        zip_code: document.getElementById("inp-zip").value,
        budget_level: document.getElementById("inp-budget").value,
        desahogo: document.getElementById("inp-text").value
    };

    const res = await fetch("/api/open-than-go",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    const data = await res.json();

    document.getElementById("loader").style.display="none";

    render(data);
}

function render(data){

    const result = document.getElementById("result");

    // TITLE EMOTION
    document.getElementById("interactive-title").innerText = data.title;

    let html = "";

    // CASA FLOW
    if(data.type === "HOME"){
        html += `
            <div class="card">
                <h3>Modo Casa</h3>
                <p>Respiración + Reset mental</p>
                <p>Duración: 10 min</p>
            </div>
        `;
    }

    // SALIR FLOW (3 LUGARES)
    if(data.type === "OUT"){

        html += `<h3>Tu opciones de hoy</h3>`;

        data.recommendations.forEach(p => {

            html += `
            <div class="place-card">
                <h3>${p.name}</h3>
                <p class="price">💵 ${p.cost}</p>
                <p>${p.why}</p>

                <div class="place-actions">
                    <a class="btn btn-primary"
                    href="${p.map}"
                    target="_blank">
                    IR AQUÍ
                    </a>
                </div>
            </div>
            `;
        });
    }

    result.innerHTML = html;
}
</script>

</body>
</html>
