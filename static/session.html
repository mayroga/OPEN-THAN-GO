<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --dark: #111111;
            --white: #ffffff;
            --gray: #eeeeee;
            --blue-circle: #00bcd4;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container-app {
            background: var(--white);
            max-width: 480px;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .header-app { text-align: center; margin-bottom: 15px; }
        .header-app h1 { color: var(--primary); margin: 0; font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
        .header-app p { font-size: 13px; color: #555; margin-top: 5px; }
        .lang-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-lang { flex: 1; padding: 8px; border: none; border-radius: 20px; background: var(--gray); font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-lang.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--primary); }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #fafafa; font-size: 14px; color: var(--dark); }
        textarea { height: 75px; resize: none; }
        .btn-grid-2, .btn-grid-4 { display: grid; gap: 8px; }
        .btn-grid-2 { grid-template-columns: repeat(2, 1fr); }
        .btn-grid-4 { grid-template-columns: repeat(4, 1fr); }
        .btn-choice { padding: 12px 5px; border-radius: 10px; border: none; background: var(--gray); font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-choice.active { background: var(--secondary); color: white; }
        .btn-trigger { width: 100%; padding: 16px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(216,67,21,0.2); }
        
        /* Animación e Interactivo */
        .interactive-screen { display: none; text-align: center; padding: 10px 0; }
        .loader-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--gray); border-top: 4px solid var(--secondary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .screen-title { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0 0 5px 0; }
        .screen-subtitle { font-size: 14px; color: #666; margin: 0 0 15px 0; font-weight: 500; }
        .card-lugar { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 14px; border-radius: 10px; text-align: left; margin-bottom: 15px; }
        .card-lugar h3 { margin: 0 0 5px 0; font-size: 15px; color: var(--primary); }
        .card-lugar p { margin: 0; font-size: 13px; color: #444; }
        .screen-story { background: #f9f9f9; padding: 16px; border-radius: 10px; border-left: 4px solid var(--secondary); text-align: left; margin-bottom: 15px; line-height: 1.4; font-size: 14px; }
        
        /* Bloque Respiración */
        .wrapper-circle { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
        .breath-circle { width: 110px; height: 110px; background: var(--blue-circle); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 16px; box-shadow: 0 0 20px rgba(0,188,212,0.3); animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .breath-inf { font-size: 12px; color: #666; margin-top: 10px; max-width: 80%; }

        /* Bloque Desafío Trivia */
        .bloque-decision { text-align: left; margin-bottom: 15px; }
        .bloque-decision h4 { margin: 0 0 8px 0; color: var(--primary); font-size: 14px; }
        .contenedor-opciones { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-opcion { width: 100%; padding: 12px; border: 1px solid #ddd; background: var(--white); border-radius: 8px; text-align: left; font-size: 13px; font-weight: 500; cursor: pointer; }
        .btn-opcion:active { background: #f5f5f5; }
        .feedback-box { display: none; margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.4; }
        .fb-correcto { display: block; background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .fb-incorrecto { display: block; background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }

        .btn-next-step { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-maps-route { display: none; width: 100%; text-align: center; padding: 14px; background: #4285f4; color: white; text-decoration: none; border-radius: 10px; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="container-app">

    <!-- SECCIÓN FORMULARIO DE ENTRADA -->
    <div id="wrapper-form">
        <div class="lang-bar">
            <button class="btn-lang active" id="lang-es" onclick="cambiarIdioma('es')">ES</button>
            <button class="btn-lang" id="lang-en" onclick="cambiarIdioma('en')">EN</button>
        </div>
        <div class="header-app">
            <h1>OPEN THAN GO</h1>
            <p id="txt-subtitle">Tu escape emocional inteligente</p>
        </div>

        <div class="form-group">
            <label id="lbl-state">Estado</label>
            <select id="inp-state">
                <option value="FL">Florida</option>
                <option value="TX">Texas</option>
                <option value="CA">California</option>
                <option value="NY">New York</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lbl-region">Región / Condado</label>
            <select id="inp-region">
                <option value="South Florida">South Florida</option>
                <option value="Central Florida">Central Florida</option>
                <option value="North Florida">North Florida</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lbl-zip">ZIP Code</label>
            <input id="inp-zip" maxlength="5" placeholder="Ej: 33101">
        </div>

        <div class="form-group">
            <label id="lbl-budget">Presupuesto Disponible</label>
            <div class="btn-grid-4">
                <button class="btn-choice active" id="b-cero" onclick="cambiarBolsillo('cero')">$0</button>
                <button class="btn-choice" id="b-minimo" onclick="cambiarBolsillo('minimo')">Mínimo</button>
                <button class="btn-choice" id="b-moderado" onclick="cambiarBolsillo('moderado')">Medio</button>
                <button class="btn-choice" id="b-libre" onclick="cambiarBolsillo('libre')">Libre</button>
            </div>
        </div>

        <div class="form-group">
            <label id="lbl-mode">¿Salir o quedarte en casa?</label>
            <div class="btn-grid-2">
                <button class="btn-choice active" id="m-salir" onclick="cambiarModalidad(true)">Salir</button>
                <button class="btn-choice" id="m-casa" onclick="cambiarModalidad(false)">Casa</button>
            </div>
        </div>

        <div class="form-group">
            <label id="lbl-desahogo">Desahogo Opcional (Filtro Emocional)</label>
            <textarea id="inp-text" placeholder="Escribe libremente cómo te sientes hoy..."></textarea>
        </div>

        <button class="btn-trigger" id="btn-main-trigger" onclick="solicitarEscape()">
            GENERAR ESCAPE
        </button>
    </div>

    <!-- SECCIÓN PANTALLA DE CARGA (Para romper la ansiedad) -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p id="txt-loader">Calculando tu vector de escape ideal...</p>
    </div>

    <!-- SECCIÓN INTERACTIVA (Veredicto sorpresa paso a paso) -->
    <div id="wrapper-interactive" class="interactive-screen">
        <h2 id="interactive-title" class="screen-title"></h2>
        <p id="interactive-subtitle" class="screen-subtitle"></p>
        
        <!-- Tarjeta dinámica de ubicación geográfica -->
        <div id="interactive-location"></div>
        
        <!-- Renderizador dinámico de los componentes del JSON -->
        <div id="step-content"></div>

        <button id="btn-next" class="btn-next-step" onclick="siguienteComando()" style="display:none;">
            CONTINUAR
        </button>
        
        <a id="btn-maps-action" class="btn-maps-route" target="_blank">
            ABRIR MAPA EN GPS
        </a>
    </div>

</div>

<script src="/static/engine.js"></script>
</body>
</html>
