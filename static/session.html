    // Llama a tu endpoint de FastAPI para mandar al usuario a Stripe Checkout
    async function enviarAPagoStripe(plan) {
        try {
            const respuesta = await fetch('/crear-checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tipo_plan: plan, user_id: "usr_cliente" })
            });
            const data = await respuesta.json();
            if (data.url) { window.location.href = data.url; } 
            else { alert("Error de Stripe: " + (data.error || "Revisa tus claves en Render")); }
        } catch (err) { alert("No se pudo conectar con el servidor de pagos."); }
    }

    // Valida tus credenciales de administrador contra main.py para el bypass gratuito
    async function autenticarDesarrollador() {
        const u = document.getElementById('dev_user').value;
        const p = document.getElementById('dev_pass').value;
        const err = document.getElementById('dev_error');
        try {
            const respuesta = await fetch('/login-admin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await respuesta.json();
            if (respuesta.status === 200 && data.status === "success") {
                localStorage.setItem('otg_user_role', 'admin');
                window.location.reload(); 
            } else {
                err.innerText = data.error || "Datos incorrectos.";
                err.style.display = "block";
            }
        } catch (e) {
            err.innerText = "Error de conexión con el backend de FastAPI.";
            err.style.display = "block";
        }
    }

    <script>

                const src = e.target.src || "";
                const fallbacks = {
                    "square_breath.svg": "🔲",
                    "silence.svg": "🤫",
                    "gratitude.svg": "🙏",
                    "laugh.svg": "😂",
                    "observe.svg": "👁️",
                    "stretch.svg": "🧘",
                    "words.svg": "✍️",
                    "nature_sound.svg": "🎵"
                };

                for (const file in fallbacks) {
                    if (src.includes(file)) {
                        const textAnchor = document.createElement("span");
                        textAnchor.textContent = fallbacks[file];
                        textAnchor.style.fontSize = "1.5rem";
                        textAnchor.style.display = "inline-block";
                        textAnchor.style.lineHeight = "1";
                        textAnchor.className = e.target.className;
                       
                        e.target.parentNode.replaceChild(textAnchor, e.target);
                        console.log(`Fallback activado con éxito para: ${file}`);
                        break;
                    }
                }
            }
        }, true);

        es: "Frecuencia Alfa (10Hz): Reduciendo ansiedad y pánico inmediato.",
        en: "Alpha Frequency (10Hz): Reducing immediate anxiety and panic."
      },
      {
        es: "Paisaje Acústico: Crujido de hojas secas bajo una brisa sutil.",
        en: "Acoustic Landscape: Rustling of dry leaves under a subtle breeze."
      },
      {
        es: "Paisaje Estelar: Eco cósmico simulado expandiendo tu mente.",
        en: "Stellar Landscape: Simulated cosmic echo expanding your mind."
      },
      {
        es: "Silencio Absoluto: Vacío cuántico. Tu atención está blindada.",
        en: "Absolute Silence: Quantum void. Your attention is shielded."
      }
    ],
    [
      {
        es: "Frecuencia Theta (6Hz): Conexión con tu subconsciente creativo.",
        en: "Theta Frequency (6Hz): Connection with creative subconscious."
      },
      {
        es: "Paisaje Acústico: Tormenta lejana con truenos muy atenuados.",
        en: "Acoustic Landscape: Distant storm with very muffled thunder."

      {
        es: "Paisaje Zen: Canto gregoriano difuminado en una catedral vacía.",
        en: "Zen Landscape: Gregorian chant blurred in an empty cathedral."
      },
      {
        es: "Silencio Absoluto: Sintonía perfecta. Reajuste interno final.",
        en: "Absolute Silence: Perfect tune. Final internal readjustment."
      }
    ]

  // Paleta de colores para cada minuto del ejercicio (4 minutos en total)
  cl: [
    "#00bcd4",
    "#2e7d32",
    "#d84315",
    "#0d47a1"
  ],

  // Selector matemático anti-repetición cruzado (18 combinaciones planas)
  inicializarSorpresa: function () {
    let lastCombo = sessionStorage.getItem("otg_last_combo");
    let newCombo;

    do {
      newCombo = Math.floor(Math.random() * 18);
    } while (newCombo.toString() === lastCombo);

    sessionStorage.setItem("otg_last_combo", newCombo);

    // Descompone el número de combinación (0-17) en dos índices
    this.md = Math.floor(newCombo / 6); // 0, 1 o 2
    this.selIdx = newCombo % 6;         // 0, 1, 2, 3, 4 o 5
  },

  ejecutar: function (segRestantes) {
    const txt =
      document.getElementById("txt-pulmon") ||
      document.getElementById("mision-display-container");

    const cir =
      document.getElementById("breath-circle") ||
      document.querySelector(".breathing-circle");

    if (!txt || !cir) {
      return;
    }

    // Inicializa la combinación al comenzar el ejercicio
    if (segRestantes === 240) {
      this.inicializarSorpresa();
    }

    // Calcula el minuto actual (0-3)
    let minActual = Math.floor((240 - segRestantes) / 60);

    if (minActual > 3) {
      minActual = 3;
    }

    // Actualiza texto y color al comenzar cada minuto
    if (segRestantes % 60 === 0) {
      const langBtn = document.querySelector(".btn-lang.active");

      const idiomaActivo =
        langBtn &&
        langBtn.innerText.toLowerCase().includes("en")
          ? "en"
          : "es";

      const estimuloHoy =
        this[this.md] && this[this.md][this.selIdx]
          ? this[this.md][this.selIdx][minActual]
          : this[0][0][minActual];

      const colorHoy = this.cl[minActual];

      txt.innerText = estimuloHoy[idiomaActivo];

      cir.style.borderColor = colorHoy;
      cir.style.boxShadow = `0 0 35px ${colorHoy}, inset 0 0 20px ${colorHoy}33`;
    }
  }
};
