<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <!-- Tu CSS permanece igual, asegurate de tener los estilos que ya definiste -->
</head>

<body>
<div class="container-app">

    <!-- FORM: El usuario interactúa aquí primero -->
    <div id="wrapper-form" class="card">
        <div class="lang-bar">
            <button id="lang-es" class="btn-lang active" onclick="cambiarIdioma('es')">ES</button>
            <button id="lang-en" class="btn-lang" onclick="cambiarIdioma('en')">EN</button>
        </div>

        <h1>OPEN THAN GO</h1>
        <p class="small">Escape emocional guiado en tiempo real</p>

        <!-- Estos inputs son capturados por engine.js al hacer clic en btn-start -->
        <div class="form-group">
            <label>Estado</label>
            <input id="inp-state" placeholder="FL, TX, CA">
        </div>
        <div class="form-group">
            <label>ZIP</label>
            <input id="inp-zip" placeholder="33101">
        </div>
        <div class="form-group">
            <label>Presupuesto</label>
            <select id="inp-budget">
                <option value="cero">$0</option>
                <option value="minimo">Mínimo</option>
                <option value="moderado">Medio</option>
                <option value="libre">Libre</option>
            </select>
        </div>
        <div class="form-group">
            <label>Desahogo</label>
            <textarea id="inp-text" placeholder="Escribe cómo te sientes..."></textarea>
        </div>

        <button id="btn-start" class="btn btn-primary" data-mode="casa">
            GENERAR EXPERIENCIA
        </button>
    </div>

    <!-- LOADER: Se muestra mientras engine.js procesa la petición -->
    <div id="wrapper-loader" class="loader-screen">
        <div class="spinner"></div>
        <p>Cargando experiencia...</p>
    </div>

    <!-- INTERACTIVE: Aquí es donde el motor inyecta las misiones -->
    <div id="wrapper-interactive" class="interactive-screen">
        <div id="breathingCircle"></div>
        <div id="timer"></div>
        
        <!-- Aquí el engine.js inyectará los pasos (tx) y los botones de dilemas -->
        <div id="step-content" class="card"></div>

        <!-- Botón de continuación obligatorio para la lógica de los pasos -->
        <button id="btn-next" class="btn-next-step">CONTINUAR</button>

        <a id="btn-maps-action" class="btn-maps-route" target="_blank" style="display:none;">
            ABRIR MAPA
        </a>
    </div>

</div>

<script src="/static/engine.js"></script>
<script>
    // Función para manejar cambios de idioma globalmente
    function cambiarIdioma(lang) {
        state.lang = lang;
        document.getElementById('lang-es').classList.toggle('active', lang === 'es');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    }
</script>
</body>
</html>
