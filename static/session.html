<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPEN THAN GO</title>
    <style>
        :root {
            --primary: #1e3a1e;
            --secondary: #2e7d32;
            --accent: #d84315;
            --light: #f1f8e9;
            --dark: #111111;
            --white: #ffffff;
            --gray: #eeeeee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container-app {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .header-app {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-app h1 {
            color: var(--primary);
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 1px;
            font-weight: 800;
        }
        .header-app p {
            margin: 0;
            color: #666;
            font-size: 14px;
            line-height: 1.4;
        }
        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-lang {
            background: var(--gray);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-lang.active {
            background: var(--primary);
            color: var(--white);
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--primary);
        }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fafafa;
        }
        .form-group textarea {
            height: 90px;
            resize: none;
        }
        .btn-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .btn-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .btn-choice {
            background: var(--gray);
            border: none;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }
        .btn-choice.active {
            background: var(--secondary);
            color: var(--white);
        }
        .btn-trigger {
            width: 100%;
            background: var(--accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .btn-trigger:hover {
            background: #b2330f;
        }
        .card-surprise {
            margin-top: 25px;
            padding: 22px;
            border-left: 6px solid var(--secondary);
            background: #f9f9f9;
            border-radius: 4px 12px 12px 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.01);
        }
        .card-surprise h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
            font-weight: 700;
        }
        .card-surprise .badge-location {
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 15px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .card-surprise pre {
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 20px 0;
            color: #333;
        }
        .btn-maps {
            display: block;
            text-align: center;
            background: #4285f4;
            color: var(--white);
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(66,133,244,0.2);
        }
    </style>
</head>
<body>

<div class="container-app">
    <!-- Barra de Selección de Idioma Obligatoria -->
    <div class="lang-bar">
        <button class="btn-lang active" id="lang-es" onclick="cambiarIdioma('es')">Español 🇪🇸</button>
        <button class="btn-lang" id="lang-en" onclick="cambiarIdioma('en')">English 🇺🇸</button>
    </div>

    <!-- Encabezado OPEN THAN GO -->
    <div class="header-app">
        <h1 id="txt-title">OPEN THAN GO</h1>
        <p id="txt-subtitle">Tu botón de escape inmediato para romper la monotonía urbana.</p>
    </div>

    <!-- Filtro Geográfico de Estados Unidos -->
    <div class="form-group">
        <label id="lbl-state">Estado / State:</label>
        <select id="inp-state">
            <option value="FL">Florida (Miami, Orlando, Tampa, Lehigh Acres, Fort Myers...)</option>
            <option value="TX">Texas (Houston, Dallas, San Antonio...)</option>
            <option value="CA">California (Los Angeles, San Diego...)</option>
            <option value="NY">New York</option>
        </select>
    </div>

    <!-- Entrada del Código Postal Nacional -->
    <div class="form-group">
        <label id="lbl-zip">ZIP Code (5 dígitos):</label>
        <input type="text" id="inp-zip" placeholder="Ej: 33936" maxlength="5">
    </div>

    <!-- BOTONES REALES DEL BOLSILLO (Cero Gastos, Moderado, Libre) -->
    <div class="form-group">
        <label id="lbl-pocket">¿Cuál es tu presupuesto real para hoy?</label>
        <div class="btn-grid-3">
            <button class="btn-choice active" id="pocket-cero" onclick="setBolsillo('cero')">GASTO $0 HOY</button>
            <button class="btn-choice" id="pocket-mod" onclick="setBolsillo('moderado')">MODERADO</button>
            <button class="btn-choice" id="pocket-libre" onclick="setBolsillo('libre')">PRESUPUESTO LIBRE</button>
        </div>
    </div>

    <!-- Selector de Modalidad (Quedarse en casa o salir a la calle) -->
    <div class="form-group">
        <label id="lbl-mode">¿Puedes o quieres salir de casa hoy?</label>
        <div class="btn-grid-2">
            <button class="btn-choice active" id="mode-out" onclick="setModalidad(true)">🟢 SÍ, NECESITO SALIR</button>
            <button class="btn-choice" id="mode-in" onclick="setModalidad(false)">🏠 NO, ME QUEDO EN CASA</button>
        </div>
    </div>

    <!-- Caja Abierta Humana de Desahogo Emocional -->
    <div class="form-group">
        <label id="lbl-text">Desahógate aquí (Escribe libremente lo que traigas en la mente):</label>
        <textarea id="inp-text" placeholder="Escribe si estás cansado de la rutina, preocupado por biles o el trabajo, solo, o con niños aburridos..."></textarea>
    </div>

    <!-- Disparador Único del Azar Inteligente -->
    <button class="btn-trigger" id="btn-submit" onclick="ejecutarEscape()">SÁCAME DE LA MONOTONÍA</button>

    <!-- PANTALLA CONTENEDORA DE RESULTADOS SORPRESA -->
    <div id="result-box" class="card-surprise" style="display: none;">
        <h2 id="res-title"></h2>
        <div class="badge-location" id="res-location"></div>
        <pre id="res-steps"></pre>
        <a id="res-maps" href="#" target="_blank" class="btn-maps" style="display: none;">🗺️ ABRIR RUTA EN MI MAPA GRATIS</a>
    </div>
</div>

<script src="/static/engine.js"></script>
</body>
</html>
