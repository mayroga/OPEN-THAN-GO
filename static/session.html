<!-- ================= OPEN THAN GO SESSION v7 FIXED ================= -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPEN THAN GO</title>

<style>
:root{
    --primary:#162a1a;
    --salir:#ff5a2c;
    --casa:#2e7d32;
    --bg:#f4f7f4;
    --card:#ffffff;
}

/* GLOBAL */
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    display:flex;
    justify-content:center;
}

.container-app{
    width:100%;
    max-width:520px;
    background:var(--card);
    min-height:100vh;
    padding:16px;
}

/* TITLE */
#interactive-title{
    text-align:center;
    font-size:24px;
    font-weight:800;
    margin:10px 0;
}

/* MODE */
.mode-badge{
    text-align:center;
    font-size:12px;
    padding:6px;
    border-radius:20px;
    margin-bottom:10px;
}

.mode-casa{ background:#e8f5e9; color:var(--casa); }
.mode-salir{ background:#fff3e0; color:var(--salir); }

/* FORM */
.form-group{ margin-bottom:10px; }

input,select,textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:5px;
    font-weight:bold;
}

.btn-primary{ background:var(--salir); color:white; }
.btn-casa{ background:var(--casa); color:white; }

/* CARDS */
.card{
    background:#fafafa;
    padding:14px;
    border-radius:12px;
    margin-top:10px;
}

/* PLACES */
.place-card{
    background:white;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.price{
    font-weight:bold;
    color:var(--primary);
}

/* LOADER */
.loader{
    display:none;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<div class="container-app">

<!-- TITLE -->
<h1 id="interactive-title">OPEN ◯ THAN GO</h1>

<!-- MODE -->
<div id="mode-badge" class="mode-badge mode-salir">
Modo: Salir
</div>

<!-- FORM -->
<div id="form">

    <div class="form-group">
        <label>Estado (USA - 50 STATES)</label>
        <input id="inp-state" placeholder="FL, TX, CA, NY...">
    </div>

    <div class="form-group">
        <label>ZIP Code</label>
        <input id="inp-zip" placeholder="33101">
    </div>

    <div class="form-group">
        <label>Presupuesto</label>
        <select id="inp-budget">
            <option value="cero">$0 - $40</option>
            <option value="minimo">$20 - $60</option>
            <option value="moderado">$40 - $70</option>
            <option value="libre">Libre</option>
        </select>
    </div>

    <div class="form-group">
        <textarea id="inp-text" placeholder="¿Cómo te sientes hoy?"></textarea>
    </div>

    <button class="btn btn-primary" onclick="setMode('salir')">
        SALIR (EXPLORAR)
    </button>

    <button class="btn btn-casa" onclick="setMode('casa')">
        CASA (RESET 10 MIN)
    </button>

    <button class="btn btn-primary" onclick="start()">
        GENERAR OPEN THAN GO
    </button>

</div>

<!-- LOADER -->
<div id="loader" class="loader">
    <p>Creando experiencia emocional...</p>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

/* ================= GLOBAL STATE ================= */
const state = {
    mode: "salir"
};

/* ================= MODE CONTROL ================= */
function setMode(m){

    state.mode = m;

    const badge = document.getElementById("mode-badge");

    if(m === "casa"){
        badge.innerText = "Modo: Casa (Reset emocional)";
        badge.className = "mode-badge mode-casa";
        document.getElementById("interactive-title").innerText = "OPEN ◯ THAN GO";
    } else {
        badge.innerText = "Modo: Salir (Exploración terapéutica)";
        badge.className = "mode-badge mode-salir";
        document.getElementById("interactive-title").innerText = "OPEN ◎ THAN GO";
    }
}

/* ================= START ================= */
async function start(){

    document.getElementById("form").style.display="none";
    document.getElementById("loader").style.display="block";

    const payload = {
        decision: state.mode,
        estado: document.getElementById("inp-state").value,
        zip_code: document.getElementById("inp-zip").value,
        budget_level: document.getElementById("inp-budget").value,
        desahogo: document.getElementById("inp-text").value
    };

    const res = await fetch("/api/open-than-go",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    const data = await res.json();

    document.getElementById("loader").style.display="none";

    render(data);
}

/* ================= RENDER ENGINE (FIXED BIO FLOW) ================= */
function render(data){

    const result = document.getElementById("result");

    let html = "";

    /* ================= CASA FLOW ================= */
    if(data.type === "Casa" || data.type === "HOME"){

        html += `
        <div class="card">
            <h2>OPEN ◯ THAN GO</h2>

            <h3>Modo Casa (Reset emocional)</h3>

            <p>🫁 Respiración guiada</p>
            <p>🧠 Limpieza mental</p>
            <p>⏳ 10 minutos de reinicio interno</p>

            <p><b>Estado emocional:</b> ${data.emotion || "neutral"}</p>
        </div>
        `;
    }

    /* ================= SALIR FLOW ================= */
    if(data.type === "Salida"){

        html += `<h3>Tu guía emocional de hoy</h3>`;

        (data.recommendations || []).forEach(p => {

            html += `
            <div class="place-card">

                <h3>${p.name}</h3>

                <p class="price">💵 ${p.cost}</p>

                <p>${p.why}</p>

                <a class="btn btn-primary"
                   href="${p.gps_link || p.map}"
                   target="_blank">
                   IR AHORA (GPS)
                </a>

            </div>
            `;
        });
    }

    /* ================= MISION BIOPSYCHOSOCIAL ================= */
    if(data.mision?.b){

        html += `<div class="card"><h3>Tu misión interna</h3>`;

        data.mision.b.forEach(step => {

            if(step.story){
                html += `<p>${step.story.es}</p>`;
            }

            if(step.tx){
                html += `<p>${step.tx.es}</p>`;
            }

        });

        html += `</div>`;
    }

    result.innerHTML = html;
}

</script>

</body>
</html>
