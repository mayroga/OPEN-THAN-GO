<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO</title>
    <style>
        :root { --primary: #1e3a1e; --secondary: #2e7d32; --accent: #d84315; --light: #f1f8e9; }
        body { font-family: sans-serif; background-color: var(--light); padding: 20px; display: flex; justify-content: center; }
        .container-app { background: white; max-width: 480px; width: 100%; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .header-app { text-align: center; margin-bottom: 15px; }
        .lang-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-lang { flex: 1; padding: 8px; border: none; border-radius: 20px; background: #eee; cursor: pointer; }
        .btn-lang.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 16px; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .btn-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-choice { padding: 12px; border-radius: 10px; border: none; background: #eee; cursor: pointer; }
        .btn-choice.active { background: var(--secondary); color: white; }
        .btn-trigger { width: 100%; padding: 16px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container-app" id="app">
    </div>

<script src="/static/engine.js"></script>
</body>
</html>
