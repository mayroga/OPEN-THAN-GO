<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN DAN GO</title>
    <style>
        :root { --bg: #000; --panel: #111; --text: #fff; --accent: #d84315; --secondary: #2e7d32; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        h1 { font-size: 1.2rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 20px; color: #444; font-weight: 900; }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; background: var(--panel); border: 1px solid #222; color: var(--text); padding: 12px; border-radius: 4px; font-size: 0.9rem; }
        textarea { height: 60px; resize: none; }
        button#btn-mando { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; font-weight: 900; cursor: pointer; margin-top: 10px; border-radius: 4px; text-transform: uppercase; }
        .hidden { display: none; }
        
        /* Capa de control de inactividad */
        #pantalla-bienvenida { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .btn-bienvenida { background:#fff; color:#000; padding:20px 40px; font-weight:900; cursor:pointer; text-transform:uppercase; border-radius:4px; }
    </style>
</head>
<body>

<!-- Pantalla de inicio obligatoria para forzar el desbloqueo de Audio -->
<div id="pantalla-bienvenida">
    <button class="btn-bienvenida" onclick="KERNEL.despertarInicial(); document.getElementById('pantalla-bienvenida').style.display='none'; document.getElementById('wrapper-form').classList.remove('hidden');">INICIAR SESIÓN</button>
</div>

<div class="container hidden" id="wrapper-form">
    <h1 id="txt-app-title">OPEN DAN GO</h1>
    
    <div class="field">
        <label id="lbl-zip">Código Postal</label>
        <input type="text" id="inp-zip" placeholder="Ej: 33167">
    </div>
    
    <div class="field">
        <label id="lbl-mode">Modo de Operación</label>
        <select id="modo-selector">
            <option value="CASA">CASA (Estabilización)</option>
            <option value="SALIR" selected>SALIR (Acción)</option>
        </select>
    </div>
    
    <div class="field">
        <label id="lbl-mente">Estado Mental</label>
        <select id="inp-mente">
            <option value="agotado">Agotado</option>
            <option value="estresado">Estresado</option>
            <option value="aburrido">Aburrido</option>
        </select>
    </div>
    
    <div class="field">
        <label id="lbl-budget">Presupuesto</label>
        <select id="inp-budget">
            <option value="0">Cero Gastos</option>
            <option value="1">Moderado</option>
        </select>
    </div>

    <div class="field">
        <label id="lbl-perfil">Perfil</label>
        <select id="inp-perfil">
            <option value="solo">Solo</option>
            <option value="familia">Familia</option>
        </select>
    </div>

    <div class="field">
        <label id="lbl-desahogo">Desahogo</label>
        <textarea id="inp-text" placeholder="Escribe tu estado actual..."></textarea>
    </div>

    <button id="btn-mando">ACTIVAR MANDO</button>
</div>

<div class="container hidden" id="wrapper-interactive">
    <div id="step-content"></div>
</div>

<script src="/static/engine.js"></script>
</body>
</html>
