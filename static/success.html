<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Than Go - Pago Exitoso</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .success-card {
            background: #111;
            border: 1px solid #2e7d32;
            padding: 35px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon {
            font-size: 3rem;
            color: #2e7d32;
            margin-bottom: 15px;
        }
        h1 {
            color: #00bcd4;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        button {
            width: 100%;
            background: #2e7d32;
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: .5px;
        }
        button:hover { background: #388e3c; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon">✓</div>
        <h1>¡Acceso Activado!</h1>
        <p>Tu pago ha sido procesado de forma segura por May Roga LLC. Tu pase ya está disponible para usar en la aplicación.</p>
        <button onclick="window.location.href='/'">Entrar a la App →</button>
    </div>
</body>
</html>
