<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPEN THAN GO - Pago Exitoso</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container-exito {
            max-width: 400px;
            width: 100%;
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        h2 {
            color: #2e7d32;
            margin-top: 0;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
        }
        p {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: justify;
        }
        .btn-acceso {
            display: block;
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn-acceso:hover {
            background: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="container-exito">
        <h2>PAGO PROCESADO CON ÉXITO</h2>
        <p>Tu pase comercial ha sido activado correctamente a través de Stripe. A partir de este momento, tienes acceso total y seguro a todas las funciones de bienestar del motor. Disfruta de tu experiencia pasiva.</p>
        
        <a href="/static/session.html" class="btn-acceso">INGRESAR A OPEN THAN GO</a>
    </div>

</body>
</html>
