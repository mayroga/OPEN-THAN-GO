<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Than Go - Acceso Verificado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center;
        }
        .success-box {
            border: 1px solid #222; padding: 35px; background: #0a0a0a; border-radius: 12px; max-width: 380px; width: 100%;
        }
        h2 { color: #00bcd4; margin-bottom: 12px; font-size: 1.4rem; letter-spacing: 1px; }
        p { color: #777; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }
        .loader {
            width: 28px; height: 28px; border: 3px solid #111; border-top: 3px solid #00bcd4; border-radius: 50%; margin: 0 auto; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const stripeSessionId = params.get('session_id');

            // Verificación estructural estricta antes de escribir en localStorage
            if (stripeSessionId && (stripeSessionId.startsWith('cs_live_') || stripeSessionId.startsWith('cs_test_'))) {
                localStorage.setItem('otg_pase_stripe', stripeSessionId);
                localStorage.setItem('otg_user_role', 'user');
                
                // Transferencia inmediata al motor principal sin demoras de CPU
                window.location.href = "/static/session.html";
            } else {
                // Si intentan forzar la URL de éxito manualmente, rebote automático
                window.location.href = "/static/session.html";
            }
        });
    </script>
</head>
<body>
    <div class="success-box">
        <h2>ACCESO AUTORIZADO</h2>
        <p>Sincronizando pasarela segura con tu motor de bienestar. Inicializando variables...</p>
        <div class="loader"></div>
    </div>
</body>
</html>
