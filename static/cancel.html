<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Than Go - Pago Cancelado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .cancel-card {
            background: #111;
            border: 1px solid #d32f2f;
            padding: 35px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon {
            font-size: 3rem;
            color: #d32f2f;
            margin-bottom: 15px;
        }
        h1 {
            color: #00bcd4;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        button {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: .5px;
        }
        button:hover { 
            background: #222;
            border-color: #00bcd4;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="icon">✕</div>
        <h1>Pago No Procesado</h1>
        <p>Has cancelado la operación o hubo un problema con tu tarjeta. No se ha realizado ningún cargo en tu cuenta de May Roga LLC.</p>
        <button onclick="window.location.href='/'">Volver a Intentarlo →</button>
    </div>
</body>
</html>
