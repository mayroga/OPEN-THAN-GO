<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Than Go - Transacción Cancelada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center;
        }
        .cancel-box {
            border: 1px solid #222; padding: 35px; background: #0a0a0a; border-radius: 12px; max-width: 380px; width: 100%;
        }
        h2 { color: #ff5722; margin-bottom: 12px; font-size: 1.4rem; }
        p { color: #777; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }
        .btn-retry {
            display: inline-block; width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; font-weight: bold; text-decoration: none; font-size: 0.85rem;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Limpieza absoluta de credenciales alteradas al cancelar el flujo
            localStorage.removeItem('otg_user_role');
            localStorage.removeItem('otg_pase_stripe');
        });
    </script>
</head>
<body>
    <div class="cancel-box">
        <h2>PROCESO INTERRUMPIDO</h2>
        <p>No se ha realizado ningún cargo. El acceso al sistema permanecerá cerrado hasta confirmar el pago.</p>
        <a href="/static/session.html" class="btn-retry">Volver al Módulo Principal</a>
    </div>
</body>
</html>
